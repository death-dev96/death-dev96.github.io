<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusTimer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0a0f;--surface:#14111a;--surface2:#1c1825;--border:#251f30;--border2:#332b42;
  --text:#f0edf5;--muted:#6b5f80;--muted2:#3d3450;
  --work:#f43f5e;--work-dim:rgba(244,63,94,.12);
  --rest:#22c55e;--rest-dim:rgba(34,197,94,.1);
  --long:#38bdf8;--long-dim:rgba(56,189,248,.1);
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
  --current-accent:var(--work);--current-dim:var(--work-dim);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--display);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TOPBAR */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--current-accent);transition:background .5s}
.topbar-logo{font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.topbar-logo-ring{width:14px;height:14px;border-radius:50%;
  border:2px solid var(--current-accent);transition:border-color .5s;
  position:relative;display:flex;align-items:center;justify-content:center}
.topbar-logo-ring::before{content:'';width:6px;height:6px;border-radius:50%;
  background:var(--current-accent);transition:background .5s}
.tab-bar{display:flex;gap:2px;background:var(--surface2);padding:4px;border-radius:8px;margin-left:auto}
.tab{padding:5px 16px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;
  color:var(--muted);transition:all .15s;font-family:var(--mono);letter-spacing:.04em;border:none;background:transparent}
.tab.active{background:var(--current-accent);color:#000;}
.tab:hover:not(.active){color:var(--text);background:var(--border)}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* TIMER PANEL */
.timer-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;gap:28px;position:relative;overflow:hidden}
.timer-panel::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 50%, var(--current-dim), transparent 70%);
  transition:background .5s;pointer-events:none}

/* SVG RING */
.ring-wrap{position:relative;width:260px;height:260px;flex-shrink:0}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--border);stroke-width:6}
.ring-progress{fill:none;stroke:var(--current-accent);stroke-width:6;
  stroke-linecap:round;transition:stroke-dashoffset .5s linear, stroke .5s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px}
.timer-display{font-family:var(--mono);font-size:3.2rem;font-weight:500;
  letter-spacing:-.03em;line-height:1}
.timer-phase{font-family:var(--mono);font-size:.7rem;color:var(--muted);
  letter-spacing:.15em;text-transform:uppercase}

/* CONTROLS */
.controls{display:flex;gap:12px;align-items:center}
.ctrl-btn{padding:12px 28px;border-radius:10px;border:none;cursor:pointer;
  font-family:var(--display);font-size:.9rem;font-weight:700;transition:all .18s}
.ctrl-primary{background:var(--current-accent);color:#000;font-size:1rem;padding:14px 40px}
.ctrl-primary:hover{filter:brightness(1.1);transform:translateY(-2px)}
.ctrl-secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
.ctrl-secondary:hover{color:var(--text);border-color:var(--current-accent)}

/* SESSION DOTS */
.session-dots{display:flex;gap:8px;align-items:center}
.s-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border2);
  background:transparent;transition:all .3s}
.s-dot.done{background:var(--work);border-color:var(--work)}
.s-dot.done.break{background:var(--rest);border-color:var(--rest)}

/* MODE SETTINGS */
.mode-settings{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.duration-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.72rem;
  cursor:pointer;transition:all .15s}
.duration-chip.sel{background:var(--current-dim);border-color:var(--current-accent);color:var(--current-accent)}

/* HISTORY PANEL */
.history-panel{width:280px;border-left:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.history-header{padding:14px 16px 10px;font-family:var(--mono);font-size:.65rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.clear-btn{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:.65rem;
  font-family:var(--mono);letter-spacing:.06em;transition:color .15s;padding:2px}
.clear-btn:hover{color:#ef4444}
.history-list{flex:1;overflow-y:auto;padding:10px}
.history-item{padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  margin-bottom:6px;background:rgba(255,255,255,.02)}
.history-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.history-phase{font-size:.65rem;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase}
.history-phase.work{color:var(--work)}
.history-phase.rest{color:var(--rest)}
.history-duration{font-family:var(--mono);font-size:.78rem;color:var(--muted)}
.history-time{font-family:var(--mono);font-size:.65rem;color:var(--muted2)}
.history-empty{padding:24px;text-align:center;color:var(--muted2);font-size:.82rem;font-style:italic;font-family:var(--mono)}

/* STATS BAR */
.stats-bar{padding:12px 16px;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:.7rem;color:var(--muted);
  display:flex;gap:16px;flex-wrap:wrap;flex-shrink:0}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{color:var(--text);font-size:.9rem;font-weight:500}

/* STOPWATCH TAB */
.stopwatch-panel{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px;gap:24px}
.sw-display{font-family:var(--mono);font-size:4rem;font-weight:500;letter-spacing:.05em;
  color:var(--text);text-align:center}
.sw-ms{font-size:2rem;color:var(--muted);vertical-align:super}
.laps-list{max-height:200px;overflow-y:auto;width:100%;max-width:320px}
.lap-item{display:flex;justify-content:space-between;padding:6px 0;
  border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.78rem;color:var(--muted)}
.lap-num{color:var(--muted2)}
.lap-time{color:var(--text)}
.lap-delta{color:var(--muted2);font-size:.7rem}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-ring" id="logo-ring"></div>
    FocusTimer
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-pomo" onclick="switchTab('pomo')">Pomodoro</button>
    <button class="tab" id="tab-sw" onclick="switchTab('sw')">Stopwatch</button>
  </div>
</div>

<div class="main">

  <!-- POMODORO -->
  <div id="pomo-view" style="display:flex;flex:1;overflow:hidden;min-height:0">

    <div class="timer-panel">

      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 260 260">
          <circle class="ring-track" cx="130" cy="130" r="115"/>
          <circle class="ring-progress" id="ring-prog" cx="130" cy="130" r="115"
            stroke-dasharray="722.6" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center">
          <div class="timer-display" id="timer-display">25:00</div>
          <div class="timer-phase" id="timer-phase">Focus Time</div>
        </div>
      </div>

      <div class="session-dots" id="session-dots"></div>

      <div class="controls">
        <button class="ctrl-btn ctrl-secondary" onclick="skipPhase()">⏭ Skip</button>
        <button class="ctrl-btn ctrl-primary" id="main-btn" onclick="toggleTimer()">▶ Start</button>
        <button class="ctrl-btn ctrl-secondary" onclick="resetTimer()">↺ Reset</button>
      </div>

      <div class="mode-settings" id="mode-settings"></div>

    </div>

    <div class="history-panel">
      <div class="history-header">
        <span>Session Log</span>
        <button class="clear-btn" onclick="clearHistory()">Clear all</button>
      </div>
      <div class="history-list" id="history-list"></div>
      <div class="stats-bar" id="stats-bar"></div>
    </div>

  </div>

  <!-- STOPWATCH -->
  <div id="sw-view" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:20px">
    <div class="sw-display" id="sw-display">00:00<span class="sw-ms" id="sw-ms">.00</span></div>
    <div class="controls">
      <button class="ctrl-btn ctrl-secondary" id="sw-lap-btn" onclick="swLap()" disabled>Lap</button>
      <button class="ctrl-btn ctrl-primary" id="sw-btn" onclick="swToggle()">▶ Start</button>
      <button class="ctrl-btn ctrl-secondary" onclick="swReset()">↺ Reset</button>
    </div>
    <div class="laps-list" id="laps-list"></div>
  </div>

</div>

<script>
const HIST_KEY = 'focustimer_history';

// ── PHASES ────────────────────────────
const PHASES = {
  work:  { label:'Focus Time',   color:'var(--work)',  dim:'var(--work-dim)',  defaultMins:25 },
  short: { label:'Short Break',  color:'var(--rest)',  dim:'var(--rest-dim)',  defaultMins:5  },
  long:  { label:'Long Break',   color:'var(--long)',  dim:'var(--long-dim)',  defaultMins:15 },
};
const DURATIONS = {
  work:  [15,20,25,30,45,60],
  short: [5,10,15],
  long:  [15,20,30],
};

let phase = 'work', totalSecs = 25*60, remainSecs = 25*60;
let running = false, interval = null, sessionsDone = 0, sessionsBeforeLong = 4;
let customDurations = { work:25, short:5, long:15 };

// ── TIMER ─────────────────────────────
function toggleTimer() {
  if (running) { clearInterval(interval); interval = null; running = false; updateMainBtn(); }
  else { running = true; updateMainBtn(); tick(); interval = setInterval(tick, 1000); }
}

function tick() {
  remainSecs--;
  if (remainSecs <= 0) { completePhase(); return; }
  updateDisplay();
}

function completePhase() {
  clearInterval(interval); interval = null; running = false;
  logSession(phase, totalSecs);
  if (phase === 'work') {
    sessionsDone++;
    renderDots();
    const next = (sessionsDone % sessionsBeforeLong === 0) ? 'long' : 'short';
    setPhase(next);
  } else {
    setPhase('work');
  }
  updateMainBtn();
  try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAA==').play(); } catch(e){}
}

function skipPhase() {
  clearInterval(interval); interval = null; running = false;
  if (phase === 'work') {
    sessionsDone++;
    const next = (sessionsDone % sessionsBeforeLong === 0) ? 'long' : 'short';
    setPhase(next);
  } else { setPhase('work'); }
  updateMainBtn();
}

function resetTimer() {
  clearInterval(interval); interval = null; running = false;
  remainSecs = totalSecs;
  updateDisplay(); updateMainBtn();
}

function setPhase(p) {
  phase = p;
  totalSecs = customDurations[p] * 60;
  remainSecs = totalSecs;
  const ph = PHASES[p];
  document.documentElement.style.setProperty('--current-accent', ph.color);
  document.documentElement.style.setProperty('--current-dim', ph.dim);
  document.getElementById('timer-phase').textContent = ph.label;
  updateDisplay(); renderDurationChips(); renderDots();
}

function updateDisplay() {
  const m = Math.floor(remainSecs/60), s = remainSecs%60;
  document.getElementById('timer-display').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const circumference = 2 * Math.PI * 115;
  const progress = remainSecs / totalSecs;
  document.getElementById('ring-prog').style.strokeDashoffset = circumference * (1 - progress);
  document.getElementById('ring-prog').style.stroke = PHASES[phase].color;
}

function updateMainBtn() {
  document.getElementById('main-btn').textContent = running ? '⏸ Pause' : '▶ Start';
}

function renderDots() {
  const el = document.getElementById('session-dots');
  el.innerHTML = Array(sessionsBeforeLong).fill(0).map((_,i) =>
    `<div class="s-dot${i<(sessionsDone%sessionsBeforeLong)||sessionsDone>=sessionsBeforeLong&&i<sessionsDone?' done'+((phase!=='work')?' break':''):''}"></div>`
  ).join('');
}

function renderDurationChips() {
  const el = document.getElementById('mode-settings');
  el.innerHTML = DURATIONS[phase].map(d =>
    `<button class="duration-chip${customDurations[phase]===d?' sel':''}" onclick="setDuration(${d})">${d}m</button>`
  ).join('');
}

function setDuration(mins) {
  customDurations[phase] = mins;
  totalSecs = mins * 60; remainSecs = totalSecs;
  updateDisplay(); renderDurationChips();
}

// ── HISTORY ───────────────────────────
function loadHistory() { try { return JSON.parse(localStorage.getItem(HIST_KEY))||[]; } catch { return []; } }
function saveHistory(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h.slice(0,200))); }

function logSession(ph, secs) {
  const h = loadHistory();
  h.unshift({ phase:ph, secs, ts:Date.now() });
  saveHistory(h); renderHistory();
}

function renderHistory() {
  const h = loadHistory();
  const list = document.getElementById('history-list');
  if (!h.length) { list.innerHTML = '<div class="history-empty">No sessions yet</div>'; renderStats([]); return; }
  list.innerHTML = h.slice(0,50).map(item => {
    const m = Math.floor(item.secs/60), isWork = item.phase==='work';
    const time = new Date(item.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return `<div class="history-item">
      <div class="history-item-header">
        <span class="history-phase ${isWork?'work':'rest'}">${isWork?'Focus':'Break'}</span>
        <span class="history-duration">${m}m</span>
      </div>
      <div class="history-time">${time}</div>
    </div>`;
  }).join('');
  renderStats(h);
}

function renderStats(h) {
  const workSessions = h.filter(i=>i.phase==='work');
  const totalFocusMins = Math.round(workSessions.reduce((s,i)=>s+i.secs,0)/60);
  const today = h.filter(i=>new Date(i.ts).toDateString()===new Date().toDateString()&&i.phase==='work').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${workSessions.length}</div><div>Total sessions</div></div>
    <div class="stat"><div class="stat-val">${totalFocusMins}m</div><div>Focus time</div></div>
    <div class="stat"><div class="stat-val">${today}</div><div>Today</div></div>`;
}

function clearHistory() {
  if (!confirm('Clear all session history?')) return;
  localStorage.removeItem(HIST_KEY); renderHistory();
}

// ── STOPWATCH ─────────────────────────
let swRunning = false, swStart = 0, swElapsed = 0, swInterval = null, swLaps = [], swLastLap = 0;

function swToggle() {
  if (swRunning) {
    swElapsed += Date.now() - swStart;
    clearInterval(swInterval); swRunning = false;
    document.getElementById('sw-btn').textContent = '▶ Start';
  } else {
    swStart = Date.now();
    swRunning = true;
    document.getElementById('sw-btn').textContent = '⏸ Pause';
    document.getElementById('sw-lap-btn').disabled = false;
    swInterval = setInterval(swUpdate, 10);
  }
}

function swUpdate() {
  const total = swElapsed + (Date.now() - swStart);
  const ms = total % 1000, s = Math.floor(total/1000)%60, m = Math.floor(total/60000);
  document.getElementById('sw-display').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('sw-ms').textContent = '.'+String(Math.floor(ms/10)).padStart(2,'0');
}

function swLap() {
  const total = swElapsed + (Date.now() - swStart);
  const delta = total - swLastLap; swLastLap = total;
  swLaps.unshift({ num:swLaps.length+1, time:total, delta });
  renderLaps();
}

function swReset() {
  clearInterval(swInterval); swRunning = false; swStart = 0; swElapsed = 0; swLastLap = 0; swLaps = [];
  document.getElementById('sw-display').textContent = '00:00';
  document.getElementById('sw-ms').textContent = '.00';
  document.getElementById('sw-btn').textContent = '▶ Start';
  document.getElementById('sw-lap-btn').disabled = true;
  renderLaps();
}

function renderLaps() {
  const el = document.getElementById('laps-list');
  function fmt(ms) { const s=Math.floor(ms/1000)%60,m=Math.floor(ms/60000),cs=Math.floor((ms%1000)/10); return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0'); }
  el.innerHTML = swLaps.map(l =>
    `<div class="lap-item"><span class="lap-num">Lap ${l.num}</span><span class="lap-time">${fmt(l.time)}</span><span class="lap-delta">+${fmt(l.delta)}</span></div>`
  ).join('');
}

// ── TABS ──────────────────────────────
function switchTab(t) {
  document.getElementById('pomo-view').style.display = t==='pomo' ? 'flex' : 'none';
  document.getElementById('sw-view').style.display = t==='sw' ? 'flex' : 'none';
  document.getElementById('tab-pomo').classList.toggle('active', t==='pomo');
  document.getElementById('tab-sw').classList.toggle('active', t==='sw');
}

// ── INIT ─────────────────────────────
setPhase('work');
renderHistory();
updateMainBtn();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasswordGen</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070a0a;--surface:#0e1212;--surface2:#141a1a;--border:#1a2222;--border2:#243030;
  --text:#e8f0f0;--muted:#4a6060;--muted2:#243030;
  --accent:#2dd4bf;--accent-dim:rgba(45,212,191,.1);
  --weak:#ef4444;--fair:#f59e0b;--good:#22c55e;--strong:#2dd4bf;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--mono);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:0;overflow-y:auto}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.topbar{width:100%;height:52px;background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:10}
.logo{font-family:var(--display);font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.privacy-note{margin-left:auto;font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.privacy-note::before{content:'🔒';font-size:.8rem}

.content{width:100%;max-width:640px;padding:28px 20px 40px;display:flex;flex-direction:column;gap:20px}

/* OUTPUT */
.output-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;
  position:relative}
.output-label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.password-display{font-size:1.3rem;letter-spacing:.15em;font-weight:400;word-break:break-all;
  line-height:1.6;min-height:52px;color:var(--text);padding-right:8px}
.output-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.out-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border2);background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:.75rem;cursor:pointer;transition:all .15s}
.out-btn:hover{border-color:var(--accent);color:var(--accent)}
.out-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}
.out-btn.primary:hover{filter:brightness(1.08)}

/* STRENGTH */
.strength-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.strength-bars{display:flex;gap:3px;flex:1}
.s-bar{height:5px;flex:1;border-radius:2px;background:var(--border2);transition:background .3s}
.strength-label{font-size:.72rem;font-weight:500;min-width:60px}
.strength-entropy{font-size:.68rem;color:var(--muted)}

/* OPTIONS */
.options-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:20px;
  display:flex;flex-direction:column;gap:16px}
.opt-section-label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px}

/* LENGTH SLIDER */
.length-row{display:flex;align-items:center;gap:12px}
.length-val{font-size:1.4rem;font-weight:500;color:var(--accent);min-width:36px;text-align:center}
.length-slider{flex:1;-webkit-appearance:none;height:5px;border-radius:2px;
  background:linear-gradient(to right,var(--accent) 0%,var(--accent) 50%,var(--border2) 50%,var(--border2) 100%);
  outline:none;cursor:pointer}
.length-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
.length-range-labels{display:flex;justify-content:space-between;font-size:.62rem;color:var(--muted2);margin-top:3px}

/* TOGGLES */
.toggles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toggle-item{display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all .15s}
.toggle-item:hover{border-color:var(--border2)}
.toggle-item.on{border-color:rgba(45,212,191,.25);background:var(--accent-dim)}
.toggle-label{font-size:.8rem;color:var(--text)}
.toggle-sub{font-size:.62rem;color:var(--muted);margin-top:1px;font-family:var(--mono)}
.toggle-switch{width:32px;height:18px;border-radius:9px;background:var(--border2);
  position:relative;flex-shrink:0;transition:background .2s}
.toggle-item.on .toggle-switch{background:var(--accent)}
.toggle-knob{width:12px;height:12px;border-radius:50%;background:#fff;position:absolute;
  top:3px;left:3px;transition:left .2s}
.toggle-item.on .toggle-knob{left:17px}

/* EXCLUSION */
.exclude-row{display:flex;align-items:center;gap:8px}
.exclude-input{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--mono);font-size:.85rem;padding:8px 12px;border-radius:7px;outline:none;
  transition:border-color .15s}
.exclude-input:focus{border-color:var(--accent)}
.exclude-input::placeholder{color:var(--muted2)}

/* BATCH */
.batch-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:20px}
.batch-list{display:flex;flex-direction:column;gap:5px;margin-top:12px;
  max-height:180px;overflow-y:auto}
.batch-item{font-family:var(--mono);font-size:.85rem;letter-spacing:.1em;padding:7px 12px;
  border-radius:6px;background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between}
.batch-item:hover{border-color:var(--accent);background:var(--accent-dim)}
.batch-copy{font-size:.65rem;color:var(--muted2)}
.batch-item:hover .batch-copy{color:var(--accent)}

/* PRESETS */
.presets-row{display:flex;gap:7px;flex-wrap:wrap}
.preset-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.68rem;
  cursor:pointer;transition:all .12s}
.preset-chip:hover{border-color:var(--accent);color:var(--accent)}

/* TOAST */
.toast-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:7px 16px;font-size:.75rem;color:var(--text);border-left:3px solid var(--accent);
  animation:tIn .15s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Password<span>Gen</span></div>
  <div class="privacy-note">No passwords stored. Ever.</div>
</div>

<div class="content">

  <!-- OUTPUT -->
  <div class="output-box">
    <div class="output-label">Generated Password</div>
    <div class="password-display" id="pwd-display">Click Generate</div>
    <div class="strength-row">
      <div class="strength-bars" id="strength-bars">
        <div class="s-bar"></div><div class="s-bar"></div>
        <div class="s-bar"></div><div class="s-bar"></div>
      </div>
      <div class="strength-label" id="strength-label">—</div>
      <div class="strength-entropy" id="strength-entropy"></div>
    </div>
    <div class="output-actions">
      <button class="out-btn primary" onclick="generate()">⟳ Generate</button>
      <button class="out-btn" onclick="copyPassword()">⎘ Copy</button>
      <button class="out-btn" onclick="generateBatch()">⊞ Batch (10)</button>
    </div>
  </div>

  <!-- OPTIONS -->
  <div class="options-box">
    <div>
      <div class="opt-section-label">Length: <span id="len-display">16</span></div>
      <div class="length-row">
        <span class="length-val" id="len-val">16</span>
        <input type="range" class="length-slider" id="len-slider" min="4" max="128" value="16" oninput="onLenChange(this.value)">
      </div>
      <div class="length-range-labels"><span>4</span><span>32</span><span>64</span><span>128</span></div>
    </div>

    <div>
      <div class="opt-section-label">Character Sets</div>
      <div class="toggles-grid" id="toggles">
        <div class="toggle-item on" data-key="upper" onclick="toggleOpt(this)">
          <div><div class="toggle-label">Uppercase</div><div class="toggle-sub">A–Z</div></div>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
        </div>
        <div class="toggle-item on" data-key="lower" onclick="toggleOpt(this)">
          <div><div class="toggle-label">Lowercase</div><div class="toggle-sub">a–z</div></div>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
        </div>
        <div class="toggle-item on" data-key="numbers" onclick="toggleOpt(this)">
          <div><div class="toggle-label">Numbers</div><div class="toggle-sub">0–9</div></div>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
        </div>
        <div class="toggle-item on" data-key="symbols" onclick="toggleOpt(this)">
          <div><div class="toggle-label">Symbols</div><div class="toggle-sub">!@#$%^&*</div></div>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
        </div>
        <div class="toggle-item" data-key="ambiguous" onclick="toggleOpt(this)">
          <div><div class="toggle-label">Exclude Similar</div><div class="toggle-sub">0O1lI</div></div>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
        </div>
        <div class="toggle-item" data-key="memorable" onclick="toggleOpt(this)">
          <div><div class="toggle-label">Memorable</div><div class="toggle-sub">word-word-123</div></div>
          <div class="toggle-switch"><div class="toggle-knob"></div></div>
        </div>
      </div>
    </div>

    <div>
      <div class="opt-section-label">Exclude Characters</div>
      <div class="exclude-row">
        <input class="exclude-input" id="exclude-chars" type="text" placeholder="Characters to exclude… e.g. {}[]\\">
        <button class="out-btn" onclick="document.getElementById('exclude-chars').value='';generate()">Clear</button>
      </div>
    </div>

    <div>
      <div class="opt-section-label">Presets</div>
      <div class="presets-row">
        <button class="preset-chip" onclick="applyPreset('pin')">📱 PIN (6)</button>
        <button class="preset-chip" onclick="applyPreset('wifi')">📶 WiFi (20)</button>
        <button class="preset-chip" onclick="applyPreset('web')">🌐 Web Login (16)</button>
        <button class="preset-chip" onclick="applyPreset('strong')">🔐 Max Secure (32)</button>
        <button class="preset-chip" onclick="applyPreset('readable')">👁 Readable (20)</button>
        <button class="preset-chip" onclick="applyPreset('apikey')">⚙️ API Key (40)</button>
      </div>
    </div>
  </div>

  <!-- BATCH -->
  <div class="batch-box" id="batch-box" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="opt-section-label">Batch — click any to copy</div>
      <button class="out-btn" onclick="document.getElementById('batch-box').style.display='none'" style="padding:3px 8px;font-size:.65rem">✕</button>
    </div>
    <div class="batch-list" id="batch-list"></div>
  </div>

</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const CHARS = {
  upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower:   'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()-_=+[]{}|;:,.<>?',
};
const AMBIGUOUS = '0O1lI';
const WORDS = ['apple','brave','cloud','delta','eagle','flame','grace','happy','ivory','jelly',
  'knight','lemon','magic','night','ocean','piano','quest','river','stone','tiger',
  'ultra','vivid','water','xenon','yacht','zebra','amber','bloom','crisp','dawn',
  'ember','frost','gloom','haze','inlet','jolly','karma','lunar','maple','nova',
  'orbit','prism','quartz','radar','solar','tempo','unity','vault','wave','xenon'];

let opts = {upper:true,lower:true,numbers:true,symbols:true,ambiguous:false,memorable:false};
let currentPwd = '';

function getOpts() {
  const o = {upper:false,lower:false,numbers:false,symbols:false,ambiguous:false,memorable:false};
  document.querySelectorAll('.toggle-item').forEach(el=>{
    o[el.dataset.key]=el.classList.contains('on');
  });
  return o;
}

function toggleOpt(el) {
  const key=el.dataset.key;
  if(key==='upper'||key==='lower'||key==='numbers'||key==='symbols') {
    const active=document.querySelectorAll('.toggle-item.on[data-key="upper"],.toggle-item.on[data-key="lower"],.toggle-item.on[data-key="numbers"],.toggle-item.on[data-key="symbols"]');
    if(active.length===1&&active[0]===el) return; // keep at least one
  }
  el.classList.toggle('on');
  generate();
}

function onLenChange(v) {
  document.getElementById('len-val').textContent=v;
  const min=4,max=128,pct=((v-min)/(max-min))*100;
  const s=document.getElementById('len-slider');
  s.style.background=`linear-gradient(to right,var(--accent) 0%,var(--accent) ${pct}%,var(--border2) ${pct}%,var(--border2) 100%)`;
  generate();
}

function generate() {
  const o=getOpts();
  const len=parseInt(document.getElementById('len-slider').value);
  const exclude=document.getElementById('exclude-chars').value||'';

  if(o.memorable) { currentPwd=generateMemorable(); }
  else { currentPwd=generateRandom(o,len,exclude); }

  document.getElementById('pwd-display').textContent=currentPwd||'—';
  updateStrength(currentPwd,o);
}

function generateRandom(o,len,exclude) {
  let pool='';
  if(o.upper)    pool+=CHARS.upper;
  if(o.lower)    pool+=CHARS.lower;
  if(o.numbers)  pool+=CHARS.numbers;
  if(o.symbols)  pool+=CHARS.symbols;
  if(o.ambiguous) [...AMBIGUOUS].forEach(c=>{ pool=pool.replace(new RegExp(c,'g'),''); });
  if(exclude)    [...exclude].forEach(c=>{ pool=pool.replace(new RegExp(c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),''); });
  if(!pool) return 'Enable at least one charset';

  // Guaranteed one from each selected set
  const arr=[];
  if(o.upper&&CHARS.upper.split('').filter(c=>!exclude.includes(c)).length)
    arr.push(secureRand(CHARS.upper.split('').filter(c=>!exclude.includes(c))));
  if(o.lower&&CHARS.lower.split('').filter(c=>!exclude.includes(c)).length)
    arr.push(secureRand(CHARS.lower.split('').filter(c=>!exclude.includes(c))));
  if(o.numbers&&CHARS.numbers.split('').filter(c=>!exclude.includes(c)).length)
    arr.push(secureRand(CHARS.numbers.split('').filter(c=>!exclude.includes(c))));
  if(o.symbols&&CHARS.symbols.split('').filter(c=>!exclude.includes(c)).length)
    arr.push(secureRand(CHARS.symbols.split('').filter(c=>!exclude.includes(c))));

  const poolArr=pool.split('');
  while(arr.length<len) arr.push(secureRand(poolArr));
  return shuffle(arr).join('').slice(0,len);
}

function generateMemorable() {
  const w1=WORDS[secureRandInt(WORDS.length)];
  const w2=WORDS[secureRandInt(WORDS.length)];
  const w3=WORDS[secureRandInt(WORDS.length)];
  const num=String(secureRandInt(1000)).padStart(3,'0');
  const sym=['!','@','#','$','%','&','*'][secureRandInt(7)];
  return `${w1}-${w2}-${w3}-${num}${sym}`;
}

function secureRand(arr) {
  const rnd=new Uint32Array(1);
  crypto.getRandomValues(rnd);
  return arr[rnd[0]%arr.length];
}
function secureRandInt(n) {
  const rnd=new Uint32Array(1);
  crypto.getRandomValues(rnd);
  return rnd[0]%n;
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const rnd=new Uint32Array(1);
    crypto.getRandomValues(rnd);
    const j=rnd[0]%(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function updateStrength(pwd, o) {
  const bars=document.querySelectorAll('.s-bar');
  const label=document.getElementById('strength-label');
  const entropy=document.getElementById('strength-entropy');
  if(!pwd||pwd==='—'||pwd.includes('Enable')){
    bars.forEach(b=>b.style.background='var(--border2)');
    label.textContent='—';entropy.textContent='';return;
  }
  let pool=0;
  if(/[A-Z]/.test(pwd))pool+=26;
  if(/[a-z]/.test(pwd))pool+=26;
  if(/[0-9]/.test(pwd))pool+=10;
  if(/[^A-Za-z0-9]/.test(pwd))pool+=32;
  const bits=Math.floor(pwd.length*Math.log2(Math.max(pool,1)));
  const score=bits<40?1:bits<60?2:bits<80?3:4;
  const colors=['var(--weak)','var(--weak)','var(--fair)','var(--good)','var(--strong)'];
  const labels=['','Weak','Fair','Good','Strong'];
  bars.forEach((b,i)=>b.style.background=i<score?colors[score]:'var(--border2)');
  label.textContent=labels[score];
  label.style.color=colors[score];
  entropy.textContent=`~${bits} bits`;
}

function copyPassword() {
  if(!currentPwd) return;
  navigator.clipboard?.writeText(currentPwd).then(()=>toast('Password copied!'));
}

function generateBatch() {
  const o=getOpts();
  const len=parseInt(document.getElementById('len-slider').value);
  const exclude=document.getElementById('exclude-chars').value||'';
  const batch=Array(10).fill(0).map(()=>o.memorable?generateMemorable():generateRandom(o,len,exclude));
  const box=document.getElementById('batch-box');
  const list=document.getElementById('batch-list');
  box.style.display='block';
  list.innerHTML=batch.map(p=>`<div class="batch-item" onclick="navigator.clipboard?.writeText('${p.replace(/'/g,"\\'")}').then(()=>toast('Copied!'))">
    <span>${p}</span><span class="batch-copy">click to copy</span>
  </div>`).join('');
  box.scrollIntoView({behavior:'smooth',block:'start'});
}

function applyPreset(key) {
  const presets = {
    pin:      {len:6, upper:false,lower:false,numbers:true,symbols:false,ambiguous:false,memorable:false},
    wifi:     {len:20,upper:true, lower:true, numbers:true,symbols:false,ambiguous:true, memorable:false},
    web:      {len:16,upper:true, lower:true, numbers:true,symbols:true, ambiguous:false,memorable:false},
    strong:   {len:32,upper:true, lower:true, numbers:true,symbols:true, ambiguous:false,memorable:false},
    readable: {len:20,upper:true, lower:true, numbers:true,symbols:false,ambiguous:true, memorable:false},
    apikey:   {len:40,upper:true, lower:true, numbers:true,symbols:false,ambiguous:false,memorable:false},
  };
  const p=presets[key]; if(!p) return;
  const slider=document.getElementById('len-slider');
  slider.value=p.len; onLenChange(p.len);
  document.querySelectorAll('.toggle-item').forEach(el=>{
    const k=el.dataset.key;
    if(k in p){if(p[k])el.classList.add('on');else el.classList.remove('on');}
  });
  generate();
}

function toast(msg){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  w.appendChild(t);setTimeout(()=>t.remove(),2000);
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='r'||e.key==='R') generate();
  if((e.metaKey||e.ctrlKey)&&e.key==='c') copyPassword();
});

onLenChange(16);
generate();
</script>
</body>
</html>

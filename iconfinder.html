<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IconFinder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#13131e;--surface2:#1a1a28;--border:#222234;--border2:#2e2e46;
  --text:#eeeef8;--muted:#5a5a80;--muted2:#30304a;
  --accent:#fb923c;--accent-dim:rgba(251,146,60,.1);
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--mono);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.topbar{height:52px;background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:var(--display);font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.search-input{width:100%;padding:7px 12px 7px 32px;border-radius:7px;
  border:1px solid var(--border2);background:var(--surface2);color:var(--text);
  font-family:var(--mono);font-size:.82rem;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted2)}
.result-count{font-size:.7rem;color:var(--muted);margin-left:auto;font-family:var(--mono)}

.app{flex:1;display:flex;overflow:hidden;min-height:0}

/* SIDEBAR */
.cats{width:180px;border-right:1px solid var(--border);background:var(--surface);
  overflow-y:auto;flex-shrink:0;padding:8px}
.cat-btn{width:100%;text-align:left;padding:8px 11px;border-radius:7px;border:none;
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.75rem;
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.cat-btn:hover{background:var(--surface2);color:var(--text)}
.cat-btn.active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(251,146,60,.2)}
.cat-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.cat-count{margin-left:auto;font-size:.62rem;color:var(--muted2)}

/* GRID */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.grid-wrap{flex:1;overflow-y:auto;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px}
.icon-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 4px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .12s;
  position:relative;min-height:64px}
.icon-btn:hover{border-color:var(--accent);background:var(--accent-dim);transform:scale(1.06)}
.icon-glyph{font-size:1.55rem;line-height:1;user-select:none}
.icon-name{font-size:.44rem;color:var(--muted2);text-align:center;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;padding:0 2px}
.icon-btn.copied{border-color:#22c55e;background:rgba(34,197,94,.1)}

/* DETAIL */
.detail{height:110px;border-top:1px solid var(--border);background:var(--surface);
  flex-shrink:0;padding:14px 20px;display:flex;align-items:center;gap:20px}
.detail-glyph{font-size:3rem;flex-shrink:0;width:60px;text-align:center}
.detail-info{flex:1;display:flex;flex-direction:column;gap:5px}
.detail-name{font-family:var(--display);font-weight:700;font-size:.95rem;margin-bottom:2px}
.detail-meta{font-size:.7rem;color:var(--muted)}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.copy-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.72rem;
  cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.primary{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.detail-empty{color:var(--muted2);font-size:.82rem;font-style:italic;width:100%;text-align:center}

/* RECENTS */
.recents-row{padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:44px}
.recents-label{font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;flex-shrink:0}
.recents-chips{display:flex;gap:6px;overflow-x:auto;flex:1}
.recent-chip{font-size:1.1rem;cursor:pointer;padding:3px 6px;border-radius:5px;
  border:1px solid var(--border);background:transparent;transition:all .12s;flex-shrink:0}
.recent-chip:hover{border-color:var(--accent);background:var(--accent-dim)}

/* TOAST */
.toast-wrap{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:7px 14px;font-size:.75rem;color:var(--text);display:flex;align-items:center;
  gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:tIn .15s ease;
  border-left:3px solid var(--accent);white-space:nowrap}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.no-results{grid-column:1/-1;padding:40px;text-align:center;color:var(--muted);font-style:italic}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Icon<span>Finder</span></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="Search emoji by name… e.g. heart, fire, star"
           oninput="onSearch(this.value)" autocomplete="off">
  </div>
  <div class="result-count" id="result-count"></div>
</div>

<div class="app">
  <div class="cats" id="cats"></div>
  <div class="main">

    </div>
    <div class="grid-wrap">

    </div>
    <div class="detail" id="detail">
      <div class="detail-empty">Click any icon to see details and copy options</div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

const RECENT_KEY = 'iconfinder_recents';
let activeCategory = 'all', searchTerm = '', selectedIcon = null;

function loadRecents() { try { return JSON.parse(localStorage.getItem(RECENT_KEY))||[]; } catch { return []; } }
function saveRecents(r) { localStorage.setItem(RECENT_KEY, JSON.stringify(r.slice(0,24))); }

function addRecent(icon) {
  const r = loadRecents().filter(x => x.e !== icon.e);
  r.unshift(icon);
  saveRecents(r);
  renderRecents();
}

function getFiltered() {
  let list = EMOJIS;
  if (activeCategory !== 'all') list = list.filter(e => e.c === activeCategory);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    list = list.filter(e => e.n.toLowerCase().includes(t) || e.e.includes(t));
  }
  return list;
}

function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = CATEGORIES.map(cat => {
    const count = cat.id === 'all' ? EMOJIS.length : EMOJIS.filter(e => e.c === cat.id).length;
    return `<button class="cat-btn${activeCategory === cat.id ? ' active' : ''}" onclick="setCategory('${cat.id}')">
      <span class="cat-icon">${cat.icon}</span>
      <span>${cat.label}</span>
      <span class="cat-count">${count}</span>
    </button>`;
  }).join('');
}

function setCategory(id) {
  activeCategory = id;
  renderCats();
  renderGrid();
}

function renderRecents() {
  const r = loadRecents();
  const el = document.getElementById('recents-chips');
  el.innerHTML = r.map(icon =>
    `<button class="recent-chip" title="${icon.n}" onclick="selectIcon(${JSON.stringify(icon).replace(/"/g,'&quot;')})">${icon.e}</button>`
  ).join('') || '<span style="font-size:.72rem;color:var(--muted2);font-style:italic">None yet</span>';
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('result-count').textContent = list.length + ' icons';
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">No icons match your search</div>';
    return;
  }
  grid.innerHTML = list.map((icon, i) =>
    `<button class="icon-btn" id="ib-${i}" title="${icon.n}" onclick='selectIcon(${JSON.stringify(icon)})'>
      <span class="icon-glyph">${icon.e}</span>
      <span class="icon-name">${icon.n.split(' ').slice(0,2).join(' ')}</span>
    </button>`
  ).join('');
}

function selectIcon(icon) {
  selectedIcon = icon;
  addRecent(icon);
  const det = document.getElementById('detail');
  const cp = codePoint(icon.e);
  det.innerHTML = `
    <div class="detail-glyph">${icon.e}</div>
    <div class="detail-info">
      <div class="detail-name">${icon.n}</div>
      <div class="detail-meta">Category: ${icon.c} &nbsp;·&nbsp; Code: ${cp}</div>
      <div class="detail-actions">
        <button class="copy-btn primary" onclick="copyText('${icon.e.replace(/'/g,"\\'")}', 'Emoji')">⎘ Copy Emoji</button>
        <button class="copy-btn" onclick="copyText('${cp}', 'Code point')">⎘ Code Point</button>
        <button class="copy-btn" onclick="copyText('&amp;#${cp.replace('U+','').replace(/^0+/,'').toLowerCase()};', 'HTML entity')">⎘ HTML Entity</button>
      </div>
    </div>`;
}

function codePoint(emoji) {
  const pts = [];
  for (const c of emoji) {
    const code = c.codePointAt(0);
    if (code !== 0xFE0F) pts.push('U+' + code.toString(16).toUpperCase().padStart(4,'0'));
  }
  return pts.join(' ');
}

function copyText(text, label) {
  navigator.clipboard?.writeText(text).then(() => toast(`Copied ${label}: ${text}`));
}

function onSearch(val) {
  searchTerm = val;
  if (val) activeCategory = 'all';
  renderCats();
  renderGrid();
}

function toast(msg) {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  w.appendChild(t); setTimeout(() => t.remove(), 2000);
}

renderCats(); renderGrid(); renderRecents();
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.target.value = ''; onSearch(''); }
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadingList</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09080c;--surface:#11101a;--surface2:#18172a;--border:#221f30;--border2:#302c44;
  --text:#eeeef6;--muted:#5a5570;--muted2:#302c44;
  --accent:#818cf8;--accent-dim:rgba(129,140,248,.1);
  --read:#22c55e;--reading:#f59e0b;--want:#818cf8;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'Lora',serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.topbar{height:52px;background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:var(--display);font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center}
.tb-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.72rem;
  cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.search-input{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.75rem;
  outline:none;transition:border-color .15s;width:180px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted2)}

.app{flex:1;display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden;min-height:0;
  border-top:none}

/* SHELF */
.shelf{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.shelf:last-child{border-right:none}
.shelf-header{padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:10px}
.shelf-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.shelf-title{font-family:var(--display);font-weight:700;font-size:.85rem}
.shelf-count{font-family:var(--mono);font-size:.68rem;color:var(--muted2);margin-left:auto}
.shelf-add-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border2);
  background:transparent;color:var(--muted2);font-family:var(--mono);font-size:.65rem;
  cursor:pointer;transition:all .12s}
.shelf-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.shelf-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}

/* BOOK CARD */
.book-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:13px;position:relative;transition:all .15s;cursor:pointer}
.book-card:hover{border-color:var(--border2);background:var(--surface2)}
.book-type-badge{display:inline-block;font-family:var(--mono);font-size:.58rem;
  letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;
  margin-bottom:7px}
.badge-book{background:rgba(129,140,248,.1);color:var(--want);border:1px solid rgba(129,140,248,.2)}
.badge-article{background:rgba(34,197,94,.08);color:var(--read);border:1px solid rgba(34,197,94,.15)}
.badge-video{background:rgba(245,158,11,.08);color:var(--reading);border:1px solid rgba(245,158,11,.15)}
.badge-other{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border2)}
.book-title{font-family:var(--display);font-weight:700;font-size:.88rem;margin-bottom:4px;
  line-height:1.3}
.book-author{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px}
.book-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.book-tag{font-family:var(--mono);font-size:.58rem;padding:2px 6px;border-radius:3px;
  background:rgba(255,255,255,.04);color:var(--muted2);border:1px solid var(--border)}
.book-notes{font-size:.78rem;color:var(--muted);line-height:1.5;font-style:italic;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:8px}
.book-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.book-rating{display:flex;gap:2px}
.star-btn{background:none;border:none;cursor:pointer;font-size:.85rem;padding:0;
  transition:transform .1s;line-height:1}
.star-btn:hover{transform:scale(1.2)}
.book-acts{display:none;gap:4px;position:absolute;top:8px;right:8px}
.book-card:hover .book-acts{display:flex}
.ba-btn{padding:3px 7px;border-radius:4px;border:none;background:var(--surface2);
  color:var(--muted);font-size:.68rem;cursor:pointer;transition:all .12s;font-family:var(--mono)}
.ba-btn:hover{color:var(--text)}.ba-btn.del:hover{color:#ef4444}
.move-btn{padding:3px 7px;border-radius:4px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-size:.62rem;cursor:pointer;
  font-family:var(--mono);transition:all .12s}
.move-btn:hover{border-color:var(--accent);color:var(--accent)}
.empty-shelf{padding:24px 16px;text-align:center;color:var(--muted2);
  font-size:.82rem;font-style:italic;font-family:var(--body)}

/* ADD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:28px;width:100%;max-width:480px;animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:var(--display);font-weight:800;font-size:1.1rem;margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem}
.modal-close:hover{color:var(--text)}
.field{margin-bottom:14px}
.field-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.field-input{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-family:var(--body);font-size:.9rem;
  outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--muted2)}
.field-select{appearance:none;cursor:pointer}
.field-textarea{resize:vertical;min-height:70px;font-style:italic}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* TOAST */
.toast-wrap{position:fixed;bottom:16px;right:16px;z-index:99999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:7px 14px;font-size:.75rem;color:var(--text);border-left:3px solid var(--accent);
  animation:tIn .15s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Reading<span>List</span></div>
  <div class="topbar-actions">
    <input class="search-input" id="search" type="text" placeholder="🔍 Search…" oninput="renderAll()">
    <button class="tb-btn primary" onclick="openAddModal('want')">＋ Add Item</button>
  </div>
</div>

<div class="app">
  <div class="shelf">
    <div class="shelf-header">
      <div class="shelf-dot" style="background:var(--want)"></div>
      <div class="shelf-title">Want to Read</div>
      <span class="shelf-count" id="count-want">0</span>
      <button class="shelf-add-btn" onclick="openAddModal('want')">＋</button>
    </div>
    <div class="shelf-list" id="shelf-want"></div>
  </div>
  <div class="shelf">
    <div class="shelf-header">
      <div class="shelf-dot" style="background:var(--reading)"></div>
      <div class="shelf-title">Currently Reading</div>
      <span class="shelf-count" id="count-reading">0</span>
      <button class="shelf-add-btn" onclick="openAddModal('reading')">＋</button>
    </div>
    <div class="shelf-list" id="shelf-reading"></div>
  </div>
  <div class="shelf">
    <div class="shelf-header">
      <div class="shelf-dot" style="background:var(--read)"></div>
      <div class="shelf-title">Finished</div>
      <span class="shelf-count" id="count-read">0</span>
      <button class="shelf-add-btn" onclick="openAddModal('read')">＋</button>
    </div>
    <div class="shelf-list" id="shelf-read"></div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">Add Item</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Type</label>
        <select class="field-input field-select" id="f-type">
          <option value="book">📚 Book</option>
          <option value="article">📰 Article</option>
          <option value="video">🎬 Video</option>
          <option value="other">📌 Other</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Shelf</label>
        <select class="field-input field-select" id="f-shelf">
          <option value="want">Want to Read</option>
          <option value="reading">Currently Reading</option>
          <option value="read">Finished</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Title *</label>
      <input class="field-input" id="f-title" type="text" placeholder="Title of the book, article, etc.">
    </div>
    <div class="field">
      <label class="field-label">Author / Source</label>
      <input class="field-input" id="f-author" type="text" placeholder="Author, publication, channel…">
    </div>
    <div class="field">
      <label class="field-label">Tags <span style="color:var(--muted2)">(comma separated)</span></label>
      <input class="field-input" id="f-tags" type="text" placeholder="fiction, design, history…">
    </div>
    <div class="field">
      <label class="field-label">Notes</label>
      <textarea class="field-input field-textarea" id="f-notes" placeholder="Why you want to read this, quick thoughts…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="tb-btn" onclick="closeModal()">Cancel</button>
      <button class="tb-btn primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const STORE_KEY='readinglist_v1';
let items=[],editId=null;
function loadItems(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||[];}catch{return[];}}
function saveItems(){localStorage.setItem(STORE_KEY,JSON.stringify(items));}
function newId(){return 'r'+Date.now()+Math.random().toString(36).slice(2,5);}

function renderAll(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  ['want','reading','read'].forEach(shelf=>{
    let list=items.filter(i=>i.shelf===shelf);
    if(q)list=list.filter(i=>(i.title+i.author+i.tags.join('')+i.notes).toLowerCase().includes(q));
    document.getElementById('count-'+shelf).textContent=list.length;
    const el=document.getElementById('shelf-'+shelf);
    if(!list.length){el.innerHTML=`<div class="empty-shelf">No items here yet</div>`;return;}
    el.innerHTML=list.map(item=>{
      const stars='★★★★★'.split('').map((s,i)=>
        `<button class="star-btn" onclick="event.stopPropagation();setRating('${item.id}',${i+1})" title="${i+1} star">${i<(item.rating||0)?'★':'☆'}</button>`
      ).join('');
      const typeCls={book:'badge-book',article:'badge-article',video:'badge-video',other:'badge-other'}[item.type]||'badge-other';
      const typeLabel={book:'📚 Book',article:'📰 Article',video:'🎬 Video',other:'📌 Other'}[item.type]||'Other';
      const nextShelf={want:'reading',reading:'read',read:'want'}[shelf];
      const nextLabel={want:'→ Reading',reading:'→ Finished',read:'→ Want'}[shelf];
      return`<div class="book-card" onclick="editItem('${item.id}')">
        <div class="book-acts">
          <button class="ba-btn del" onclick="event.stopPropagation();deleteItem('${item.id}')">✕</button>
        </div>
        <span class="book-type-badge ${typeCls}">${typeLabel}</span>
        <div class="book-title">${esc(item.title)}</div>
        ${item.author?`<div class="book-author">${esc(item.author)}</div>`:''}
        ${item.tags.length?`<div class="book-tags">${item.tags.map(t=>`<span class="book-tag">${esc(t)}</span>`).join('')}</div>`:''}
        ${item.notes?`<div class="book-notes">${esc(item.notes)}</div>`:''}
        <div class="book-footer">
          <div class="book-rating">${stars}</div>
          <button class="move-btn" onclick="event.stopPropagation();moveItem('${item.id}','${nextShelf}')">${nextLabel} →</button>
        </div>
      </div>`;
    }).join('');
  });
}

function openAddModal(shelf){
  editId=null;
  document.getElementById('modal-title-text').textContent='Add Item';
  document.getElementById('f-type').value='book';
  document.getElementById('f-shelf').value=shelf||'want';
  document.getElementById('f-title').value='';
  document.getElementById('f-author').value='';
  document.getElementById('f-tags').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),80);
}

function editItem(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  editId=id;
  document.getElementById('modal-title-text').textContent='Edit Item';
  document.getElementById('f-type').value=item.type;
  document.getElementById('f-shelf').value=item.shelf;
  document.getElementById('f-title').value=item.title;
  document.getElementById('f-author').value=item.author;
  document.getElementById('f-tags').value=item.tags.join(', ');
  document.getElementById('f-notes').value=item.notes;
  document.getElementById('modal').classList.add('open');
}

function saveItem(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('Title is required');return;}
  if(editId){
    const item=items.find(i=>i.id===editId);
    if(item){
      item.type=document.getElementById('f-type').value;
      item.shelf=document.getElementById('f-shelf').value;
      item.title=title;
      item.author=document.getElementById('f-author').value.trim();
      item.tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
      item.notes=document.getElementById('f-notes').value.trim();
    }
  }else{
    items.unshift({
      id:newId(),
      type:document.getElementById('f-type').value,
      shelf:document.getElementById('f-shelf').value,
      title,author:document.getElementById('f-author').value.trim(),
      tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
      notes:document.getElementById('f-notes').value.trim(),
      rating:0,added:Date.now()
    });
  }
  saveItems();closeModal();renderAll();
}

function deleteItem(id){items=items.filter(i=>i.id!==id);saveItems();renderAll();}
function moveItem(id,shelf){const item=items.find(i=>i.id===id);if(item){item.shelf=shelf;saveItems();renderAll();}}
function setRating(id,r){const item=items.find(i=>i.id===id);if(item){item.rating=r===item.rating?0:r;saveItems();renderAll();}}
function closeModal(){document.getElementById('modal').classList.remove('open');}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const w=document.getElementById('toast-wrap');const t=document.createElement('div');t.className='toast';t.textContent=msg;w.appendChild(t);setTimeout(()=>t.remove(),2200);}

items=loadItems();
renderAll();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteWall</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09080e;--surface:#110f18;--surface2:#181522;--border:#231f30;--border2:#30284

0;
  --text:#f0edf8;--muted:#6a6080;--muted2:#3a3450;
  --accent:#a78bfa;--accent-dim:rgba(167,139,250,.1);--accent2:#c4b5fd;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'Playfair Display',serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TOPBAR */
.topbar{height:52px;background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-logo{font-family:var(--display);font-weight:800;font-size:.95rem;
  display:flex;align-items:center;gap:8px}
.topbar-logo span{color:var(--accent)}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center}
.tb-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.72rem;
  cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.search-wrap{position:relative}
.search-input{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.75rem;
  outline:none;transition:border-color .15s;width:200px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted2)}

/* LAYOUT */
.app{flex:1;display:grid;grid-template-columns:1fr 340px;overflow:hidden;min-height:0}

/* ── LEFT: WALL ── */
.wall-col{display:flex;flex-direction:column;overflow:hidden}

/* FEATURED QUOTE */
.featured{padding:32px 40px;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;overflow:hidden;cursor:pointer;min-height:180px;
  display:flex;flex-direction:column;justify-content:center;transition:background .15s}
.featured::before{content:'❝';position:absolute;top:-10px;left:24px;font-size:8rem;
  color:var(--accent);opacity:.06;font-family:serif;line-height:1;pointer-events:none}
.featured:hover{background:var(--surface2)}
.featured-text{font-size:1.35rem;line-height:1.75;font-style:italic;color:var(--text);
  max-width:680px;position:relative;z-index:1;margin-bottom:14px}
.featured-meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.72rem;color:var(--muted)}
.featured-author{color:var(--accent2)}
.featured-tag{padding:2px 8px;border-radius:4px;background:var(--accent-dim);
  border:1px solid rgba(167,139,250,.2);color:var(--accent2)}
.featured-actions{position:absolute;top:12px;right:16px;display:flex;gap:6px}
.feat-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.65rem;
  cursor:pointer;transition:all .15s}
.feat-btn:hover{border-color:var(--accent);color:var(--accent)}

/* FILTERS */
.filters{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;
  flex-wrap:wrap;align-items:center;flex-shrink:0;background:var(--surface)}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.68rem;
  cursor:pointer;transition:all .12s}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.filter-count{font-size:.6rem;color:var(--muted2);margin-left:3px}

/* QUOTE GRID */
.quote-grid{flex:1;overflow-y:auto;padding:16px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;align-content:start}
.quote-card{padding:18px 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);position:relative;cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;gap:10px}
.quote-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px)}
.quote-card.featured-card{border-color:rgba(167,139,250,.3);background:var(--accent-dim)}
.qc-text{font-style:italic;font-size:.92rem;line-height:1.65;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.qc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.qc-author{font-family:var(--mono);font-size:.68rem;color:var(--accent2)}
.qc-tag{font-family:var(--mono);font-size:.6rem;padding:2px 7px;border-radius:4px;
  background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border2)}
.qc-actions{display:none;position:absolute;top:8px;right:8px;gap:4px}
.quote-card:hover .qc-actions{display:flex}
.qc-btn{padding:3px 7px;border-radius:4px;border:none;background:var(--surface2);
  color:var(--muted);font-size:.68rem;cursor:pointer;transition:all .12s;font-family:var(--mono)}
.qc-btn:hover{color:var(--text)}
.qc-btn.del:hover{color:#ef4444}
.qc-btn.star{color:var(--accent)}

/* EMPTY */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:60px 20px;color:var(--muted);text-align:center}
.empty-icon{font-size:2.5rem;opacity:.3}

/* ── RIGHT: ADD FORM ── */
.add-col{border-left:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;overflow:hidden}
.add-header{padding:14px 18px 10px;font-family:var(--mono);font-size:.65rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border)}
.add-form{padding:16px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.field-label{font-family:var(--mono);font-size:.62rem;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.quote-textarea{width:100%;padding:10px 13px;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-family:var(--body);font-size:.95rem;
  line-height:1.7;resize:none;outline:none;transition:border-color .15s;font-style:italic}
.quote-textarea:focus{border-color:var(--accent)}
.quote-textarea::placeholder{color:var(--muted2)}
.quote-input{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.82rem;
  outline:none;transition:border-color .15s}
.quote-input:focus{border-color:var(--accent)}
.quote-input::placeholder{color:var(--muted2)}
.add-btn{padding:11px;border-radius:8px;background:var(--accent);color:#000;
  font-family:var(--display);font-weight:700;font-size:.85rem;border:none;
  cursor:pointer;transition:all .18s}
.add-btn:hover{filter:brightness(1.1)}

/* STATS */
.add-stats{padding:14px 16px;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:.68rem;color:var(--muted);
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex-shrink:0}
.stat-block{text-align:center;padding:8px;border-radius:7px;background:var(--surface2)}
.stat-num{font-size:1rem;font-weight:500;color:var(--text);display:block;margin-bottom:2px}

/* RANDOM */
.random-section{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.random-btn{width:100%;padding:10px;border-radius:8px;background:var(--accent-dim);
  border:1px solid rgba(167,139,250,.2);color:var(--accent);font-family:var(--display);
  font-weight:700;font-size:.82rem;cursor:pointer;transition:all .15s}
.random-btn:hover{background:rgba(167,139,250,.18)}

/* TOAST */
.toast-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:8px 16px;font-size:.75rem;color:var(--text);display:flex;align-items:center;
  gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:tIn .2s ease;
  font-family:var(--mono);white-space:nowrap}
.toast.ok{border-left:3px solid var(--accent)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Quote<span>Wall</span></div>
  <div class="topbar-actions">
    <input class="search-input" id="search-input" type="text" placeholder="🔍 Search quotes…" oninput="onSearch(this.value)">
    <button class="tb-btn" id="sort-btn" onclick="toggleSort()">Sort: Newest</button>
    <button class="tb-btn" onclick="exportQuotes()">⬇ Export</button>
  </div>
</div>

<div class="app">

  <!-- WALL -->
  <div class="wall-col">

    <!-- Featured -->
    <div class="featured" id="featured" onclick="randomQuote()">
      <div class="featured-actions">
        <button class="feat-btn" onclick="event.stopPropagation();copyFeatured()">⎘ Copy</button>
        <button class="feat-btn" onclick="event.stopPropagation();randomQuote()">↻ Random</button>
      </div>
      <div class="featured-text" id="feat-text">Click to display a random quote from your collection.</div>
      <div class="featured-meta">
        <span class="featured-author" id="feat-author"></span>
        <span class="featured-tag" id="feat-tag" style="display:none"></span>
      </div>
    </div>

    <!-- Tag filters -->
    <div class="filters" id="tag-filters"></div>

    <!-- Grid -->
    <div class="quote-grid" id="quote-grid"></div>

  </div>

  <!-- ADD FORM -->
  <div class="add-col">
    <div class="add-header">Add a Quote</div>
    <div class="add-form">
      <div>
        <div class="field-label">Quote</div>
        <textarea class="quote-textarea" id="q-text" rows="5" placeholder="Enter the quote…"></textarea>
      </div>
      <div>
        <div class="field-label">Author</div>
        <input class="quote-input" id="q-author" type="text" placeholder="Who said it?">
      </div>
      <div>
        <div class="field-label">Source <span style="color:var(--muted2)">(optional)</span></div>
        <input class="quote-input" id="q-source" type="text" placeholder="Book, film, speech…">
      </div>
      <div>
        <div class="field-label">Tag <span style="color:var(--muted2)">(optional)</span></div>
        <input class="quote-input" id="q-tag" type="text" placeholder="motivation, wisdom, funny…">
      </div>
      <button class="add-btn" onclick="addQuote()">＋ Add to Wall</button>
    </div>

    <div class="random-section">
      <button class="random-btn" onclick="randomQuote()">✦ Show Me a Random Quote</button>
    </div>

    <div class="add-stats" id="add-stats">
      <div class="stat-block"><span class="stat-num" id="stat-total">0</span>Quotes</div>
      <div class="stat-block"><span class="stat-num" id="stat-authors">0</span>Authors</div>
      <div class="stat-block"><span class="stat-num" id="stat-tags">0</span>Tags</div>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const STORE_KEY = 'quotewall_v1';
let quotes = [], sortOrder = 'newest', activeTag = null, searchTerm = '';

// ── STORAGE ──────────────────────────
function loadQ() { try { return JSON.parse(localStorage.getItem(STORE_KEY))||[]; } catch { return []; } }
function saveQ() { localStorage.setItem(STORE_KEY, JSON.stringify(quotes)); }

// ── INIT ─────────────────────────────
function init() {
  quotes = loadQ();
  render();
  if (quotes.length) randomQuote();
}

// ── ADD ───────────────────────────────
function addQuote() {
  const text = document.getElementById('q-text').value.trim();
  if (!text) { toast('Enter a quote first', 'info'); return; }
  const q = {
    id: 'q_'+Date.now(),
    text,
    author: document.getElementById('q-author').value.trim(),
    source: document.getElementById('q-source').value.trim(),
    tag:    document.getElementById('q-tag').value.trim().toLowerCase(),
    added:  Date.now(),
    starred: false,
  };
  quotes.unshift(q);
  saveQ();
  document.getElementById('q-text').value = '';
  document.getElementById('q-author').value = '';
  document.getElementById('q-source').value = '';
  document.getElementById('q-tag').value = '';
  render();
  setFeatured(q);
  toast('Quote added ✦', 'ok');
}

// ── DELETE / STAR ─────────────────────
function deleteQuote(id) {
  quotes = quotes.filter(q => q.id !== id);
  saveQ(); render();
}

function toggleStar(id) {
  const q = quotes.find(q => q.id === id);
  if (q) { q.starred = !q.starred; saveQ(); render(); }
}

// ── RENDER ────────────────────────────
function getFiltered() {
  let list = [...quotes];
  if (activeTag) list = list.filter(q => q.tag === activeTag);
  if (searchTerm) list = list.filter(q =>
    q.text.toLowerCase().includes(searchTerm) ||
    (q.author||'').toLowerCase().includes(searchTerm) ||
    (q.tag||'').toLowerCase().includes(searchTerm)
  );
  if (sortOrder === 'oldest') list.sort((a,b) => a.added - b.added);
  else if (sortOrder === 'author') list.sort((a,b) => (a.author||'').localeCompare(b.author||''));
  else if (sortOrder === 'starred') list.sort((a,b) => (b.starred?1:0)-(a.starred?1:0));
  return list;
}

function render() {
  renderGrid();
  renderTagFilters();
  renderStats();
}

function renderGrid() {
  const grid = document.getElementById('quote-grid');
  const list = getFiltered();
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><div style="font-family:var(--display);font-size:1rem;font-weight:700">${quotes.length?'No matches':'Your wall is empty'}</div><div style="font-size:.88rem">${quotes.length?'Try a different search or tag.':'Add your first quote using the form →'}</div></div>`;
    return;
  }
  grid.innerHTML = list.map(q => `
    <div class="quote-card${q.starred?' featured-card':''}" onclick="setFeatured(getQuote('${q.id}'))">
      <div class="qc-actions">
        <button class="qc-btn star" onclick="event.stopPropagation();toggleStar('${q.id}')" title="${q.starred?'Unstar':'Star'}">${q.starred?'★':'☆'}</button>
        <button class="qc-btn" onclick="event.stopPropagation();copyQuote('${q.id}')" title="Copy">⎘</button>
        <button class="qc-btn del" onclick="event.stopPropagation();deleteQuote('${q.id}')" title="Delete">✕</button>
      </div>
      <div class="qc-text">${esc(q.text)}</div>
      <div class="qc-meta">
        <span class="qc-author">${q.author ? '— '+esc(q.author) : ''}</span>
        ${q.tag ? `<span class="qc-tag">${esc(q.tag)}</span>` : ''}
      </div>
    </div>`).join('');
}

function renderTagFilters() {
  const tags = [...new Set(quotes.map(q=>q.tag).filter(Boolean))].sort();
  const el = document.getElementById('tag-filters');
  if (!tags.length) { el.innerHTML=''; return; }
  el.innerHTML = `<button class="filter-chip${!activeTag?' active':''}" onclick="setTagFilter(null)">All <span class="filter-count">${quotes.length}</span></button>`
    + tags.map(t => {
        const n = quotes.filter(q=>q.tag===t).length;
        return `<button class="filter-chip${activeTag===t?' active':''}" onclick="setTagFilter('${t}')">${esc(t)} <span class="filter-count">${n}</span></button>`;
      }).join('');
}

function renderStats() {
  const authors = new Set(quotes.map(q=>q.author).filter(Boolean)).size;
  const tags = new Set(quotes.map(q=>q.tag).filter(Boolean)).size;
  document.getElementById('stat-total').textContent = quotes.length;
  document.getElementById('stat-authors').textContent = authors;
  document.getElementById('stat-tags').textContent = tags;
}

// ── FEATURED ──────────────────────────
function setFeatured(q) {
  if (!q) return;
  document.getElementById('feat-text').textContent = q.text;
  const auth = document.getElementById('feat-author');
  const tag = document.getElementById('feat-tag');
  auth.textContent = q.author ? '— ' + q.author + (q.source ? ', ' + q.source : '') : '';
  if (q.tag) { tag.textContent = q.tag; tag.style.display=''; } else tag.style.display='none';
}

function randomQuote() {
  const list = getFiltered();
  if (!list.length) return;
  setFeatured(list[Math.floor(Math.random()*list.length)]);
}

function copyFeatured() {
  const text = document.getElementById('feat-text').textContent;
  const auth = document.getElementById('feat-author').textContent;
  navigator.clipboard?.writeText(text + (auth?'\n'+auth:'')).then(()=>toast('Copied','ok'));
}

function getQuote(id) { return quotes.find(q=>q.id===id); }

function copyQuote(id) {
  const q = getQuote(id); if(!q) return;
  const text = `"${q.text}"${q.author?'\n— '+q.author:''}`;
  navigator.clipboard?.writeText(text).then(()=>toast('Copied','ok'));
}

// ── FILTERS ───────────────────────────
function setTagFilter(tag) { activeTag=tag; render(); }
function onSearch(val) { searchTerm=val.toLowerCase(); render(); }

let sortCycle = ['newest','oldest','author','starred'];
let sortIdx = 0;
function toggleSort() {
  sortIdx = (sortIdx+1)%sortCycle.length;
  sortOrder = sortCycle[sortIdx];
  const labels = {newest:'Newest',oldest:'Oldest',author:'Author',starred:'Starred'};
  document.getElementById('sort-btn').textContent = 'Sort: '+labels[sortOrder];
  render();
}

// ── EXPORT ────────────────────────────
function exportQuotes() {
  if (!quotes.length) { toast('No quotes to export','info'); return; }
  const text = quotes.map(q =>
    `"${q.text}"${q.author?'\n— '+q.author:''}${q.source?' ('+q.source+')':''}${q.tag?'\n['+q.tag+']':''}`
  ).join('\n\n---\n\n');
  const blob = new Blob([text],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'quotewall.txt';
  a.click(); toast('Exported','ok');
}

// ── UTILS ─────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg,type='info'){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast'+(type==='ok'?' ok':'');
  t.textContent=msg;w.appendChild(t);setTimeout(()=>t.remove(),2500);
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key===' '||e.key==='r'){e.preventDefault();randomQuote();}
});

init();
</script>
</body>
</html>

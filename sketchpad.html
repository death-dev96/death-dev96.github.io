<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SketchPad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
  --text:#e8eaf6;--muted:#8891b5;--accent:#38bdf8;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
header h1{font-size:1.1rem;font-weight:700}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.tool-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}
.tool-btn.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
.sep{width:1px;height:28px;background:var(--border);margin:0 4px}
.size-row{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
input[type=range]{width:80px;accent-color:var(--accent)}
.color-row{display:flex;align-items:center;gap:4px}
.swatch{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:border-color .12s}
.swatch.active,.swatch:hover{border-color:var(--text)}
#custom-color{width:30px;height:30px;border:none;cursor:pointer;border-radius:6px;padding:0;background:none}
.btn-sm{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .12s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{color:#f87171;border-color:#f87171}.btn-danger:hover{background:#f871711a}
canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
#canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#181b26}
canvas{cursor:crosshair;display:block;touch-action:none}
.size-preview{width:var(--sz,10px);height:var(--sz,10px);border-radius:50%;background:var(--preview-color,#fff);pointer-events:none;margin-left:4px}
</style>
</head>
<body>
<header>
  <span>🎨</span>
  <h1>SketchPad</h1>
</header>
<div class="toolbar">
  <!-- Tools -->
  <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')" title="Pen">✏️</button>
  <button class="tool-btn" id="tool-brush" onclick="setTool('brush')" title="Brush">🖌️</button>
  <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser">🩹</button>
  <button class="tool-btn" id="tool-line" onclick="setTool('line')" title="Line">╱</button>
  <button class="tool-btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle">▭</button>
  <button class="tool-btn" id="tool-ellipse" onclick="setTool('ellipse')" title="Ellipse">⬭</button>
  <button class="tool-btn" id="tool-fill" onclick="setTool('fill')" title="Fill">🪣</button>
  <div class="sep"></div>
  <!-- Size -->
  <div class="size-row">
    <span>Size</span>
    <input type="range" id="size-slider" min="1" max="60" value="8" oninput="updateSize(this.value)">
    <span id="size-label">8</span>
  </div>
  <div class="size-preview" id="size-preview"></div>
  <div class="sep"></div>
  <!-- Colors -->
  <div class="color-row" id="swatches"></div>
  <input type="color" id="custom-color" value="#7c6cfc" title="Custom color" onchange="pickColor(this.value)">
  <div class="sep"></div>
  <button class="btn-sm" onclick="undo()">↩ Undo</button>
  <button class="btn-sm" onclick="savePNG()">💾 Save PNG</button>
  <button class="btn-sm btn-danger" onclick="clearCanvas()">🗑 Clear</button>
</div>
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>
<script>
const COLORS=['#e8eaf6','#f87171','#fb923c','#fbbf24','#34d399','#38bdf8','#7c6cfc','#f472b6','#0f1117'];
let curColor=COLORS[0], curTool='pen', curSize=8;
let drawing=false, startX=0, startY=0;
let history=[], snapshot=null;

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');

function resize(){
  const W=wrap.clientWidth, H=wrap.clientHeight;
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width=W; canvas.height=H;
  ctx.putImageData(img,0,0);
}
window.addEventListener('resize',()=>resize());

function init(){
  canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight;
  ctx.fillStyle='#1a1d27'; ctx.fillRect(0,0,canvas.width,canvas.height);
  saveHistory();
}

// Swatches
const sw=document.getElementById('swatches');
COLORS.forEach(c=>{
  const d=document.createElement('div');
  d.className='swatch'+(c===curColor?' active':'');
  d.style.background=c;
  d.onclick=()=>pickColor(c,d);
  sw.appendChild(d);
});
function pickColor(c,el){
  curColor=c;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('custom-color').value=c;
  updateSizePreview();
}
function setTool(t){
  curTool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+t).classList.add('active');
  canvas.style.cursor=t==='fill'?'cell':t==='eraser'?'cell':'crosshair';
}
function updateSize(v){
  curSize=parseInt(v);
  document.getElementById('size-label').textContent=v;
  updateSizePreview();
}
function updateSizePreview(){
  const p=document.getElementById('size-preview');
  const sz=Math.min(curSize,40)+'px';
  p.style.setProperty('--sz',sz);
  p.style.setProperty('--preview-color',curTool==='eraser'?'#8891b5':curColor);
  p.style.width=sz; p.style.height=sz;
}
updateSizePreview();

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return [src.clientX-r.left, src.clientY-r.top];
}

function saveHistory(){
  history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  if(history.length>40) history.shift();
}
function undo(){
  if(history.length>1){history.pop();ctx.putImageData(history[history.length-1],0,0);}
}

// Drawing
canvas.addEventListener('pointerdown',e=>{
  if(e.button!==undefined&&e.button!==0) return;
  const [x,y]=getPos(e);
  startX=x; startY=y; drawing=true;
  if(curTool==='fill'){floodFill(Math.round(x),Math.round(y),curColor);saveHistory();return;}
  snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.beginPath(); ctx.moveTo(x,y);
  applyStyle();
  if(curTool==='pen'||curTool==='brush'||curTool==='eraser') ctx.lineTo(x+0.01,y+0.01);
  ctx.stroke();
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!drawing) return;
  const [x,y]=getPos(e);
  if(curTool==='pen'||curTool==='brush'||curTool==='eraser'){
    applyStyle();
    ctx.lineTo(x,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y);
  } else {
    ctx.putImageData(snapshot,0,0);
    applyStyle(true);
    drawShape(startX,startY,x,y);
  }
});
canvas.addEventListener('pointerup',e=>{
  if(!drawing) return;
  drawing=false;
  saveHistory();
});

function applyStyle(preview=false){
  if(curTool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';
    ctx.fillStyle='rgba(0,0,0,1)';
    ctx.lineWidth=curSize;
    ctx.lineCap='round'; ctx.lineJoin='round';
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=curColor;
    ctx.fillStyle=curColor;
    ctx.lineWidth=curTool==='brush'?curSize*2:curSize;
    ctx.lineCap=curTool==='pen'?'round':'round';
    ctx.lineJoin='round';
    if(curTool==='brush') ctx.globalAlpha=0.65; else ctx.globalAlpha=1;
  }
}
function drawShape(x1,y1,x2,y2){
  ctx.beginPath();
  if(curTool==='line'){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  else if(curTool==='rect'){ctx.strokeRect(x1,y1,x2-x1,y2-y1);}
  else if(curTool==='ellipse'){
    ctx.ellipse((x1+x2)/2,(y1+y2)/2,Math.abs(x2-x1)/2,Math.abs(y2-y1)/2,0,0,2*Math.PI);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

// Flood fill (simple scanline)
function floodFill(sx,sy,fillHex){
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=imgData.data, W=canvas.width, H=canvas.height;
  const idx=(x,y)=>(y*W+x)*4;
  const i=idx(sx,sy);
  const tr=d[i],tg=d[i+1],tb=d[i+2],ta=d[i+3];
  const fr=parseInt(fillHex.slice(1,3),16), fg=parseInt(fillHex.slice(3,5),16), fb=parseInt(fillHex.slice(5,7),16);
  if(tr===fr&&tg===fg&&tb===fb&&ta===255) return;
  const match=i2=>(d[i2]===tr&&d[i2+1]===tg&&d[i2+2]===tb&&d[i2+3]===ta);
  const stack=[[sx,sy]];
  while(stack.length){
    const [x,y]=stack.pop();
    if(x<0||x>=W||y<0||y>=H) continue;
    const j=idx(x,y);
    if(!match(j)) continue;
    d[j]=fr;d[j+1]=fg;d[j+2]=fb;d[j+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgData,0,0);
}

function clearCanvas(){
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  ctx.fillStyle='#1a1d27'; ctx.fillRect(0,0,canvas.width,canvas.height);
  saveHistory();
}
function savePNG(){
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='sketch.png'; a.click();
}

init();
</script>
</body>
</html>

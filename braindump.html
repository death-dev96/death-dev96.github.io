<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrainDump</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
  --text:#e8eaf6;--muted:#8891b5;--accent:#22d3ee;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:1.1rem;font-weight:700}header span{font-size:1.4rem}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;font-size:.8rem;color:var(--muted)}
/* Capture area */
.capture{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;flex-shrink:0}
.capture-row{display:flex;gap:8px;align-items:flex-end}
.capture-area{flex:1}
textarea#dump-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--text);padding:12px 16px;font-size:1rem;resize:none;outline:none;font-family:inherit;line-height:1.5;min-height:52px;max-height:140px;transition:border-color .15s;overflow:hidden}
textarea#dump-input:focus{border-color:var(--accent)}
.capture-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center}
.bucket-btns{display:flex;gap:4px}
.bkt-btn{padding:4px 12px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:600;transition:all .12s}
.bkt-btn.active{color:#0f1117;border-color:transparent}
.bkt-btn[data-b="idea"].active{background:#f59e0b}
.bkt-btn[data-b="task"].active{background:#34d399}
.bkt-btn[data-b="question"].active{background:#818cf8}
.bkt-btn[data-b="random"].active{background:#f472b6}
.tag-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:4px 10px;font-size:.8rem;outline:none;width:130px}
.tag-input:focus{border-color:var(--accent)}
.dump-btn{padding:10px 20px;background:var(--accent);border:none;border-radius:10px;color:#0f1117;font-weight:700;cursor:pointer;font-size:.9rem;white-space:nowrap;transition:opacity .15s;flex-shrink:0}
.dump-btn:hover{opacity:.85}
/* Filter bar */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.filter-btn{padding:4px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.78rem;transition:all .12s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
.search-box{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 10px;font-size:.82rem;outline:none;width:160px}
.search-box:focus{border-color:var(--accent)}
/* Cards area */
.cards-area{flex:1;overflow-y:auto;padding:16px 20px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.thought-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .15s;position:relative}
.thought-card:hover{border-color:var(--accent)}
.tc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.tc-badge{padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:2px}
.badge-idea{background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44}
.badge-task{background:#34d39922;color:#34d399;border:1px solid #34d39944}
.badge-question{background:#818cf822;color:#818cf8;border:1px solid #818cf844}
.badge-random{background:#f472b622;color:#f472b6;border:1px solid #f472b644}
.tc-text{font-size:.9rem;line-height:1.6;flex:1;white-space:pre-wrap;word-break:break-word}
.tc-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.tc-tag{padding:2px 8px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);font-size:.72rem;color:var(--muted);cursor:pointer;transition:all .12s}
.tc-tag:hover{border-color:var(--accent);color:var(--accent)}
.tc-date{margin-left:auto;font-size:.7rem;color:var(--muted)}
.tc-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--border);cursor:pointer;font-size:.8rem;opacity:0;transition:opacity .12s}
.thought-card:hover .tc-del{opacity:1}.tc-del:hover{color:#f87171}
.tc-check{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;margin-top:3px}
.tc-text.done{text-decoration:line-through;color:var(--muted)}
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .big{font-size:3rem;margin-bottom:12px}
</style>
</head>
<body>
<header>
  <span>🧠</span>
  <h1>BrainDump</h1>
  <div class="hdr-right">
    <span id="count-label">0 thoughts</span>
    <button style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:4px 10px;cursor:pointer;font-size:.78rem" onclick="clearAll()">Clear All</button>
  </div>
</header>
<div class="capture">
  <div class="capture-row">
    <div class="capture-area">
      <textarea id="dump-input" placeholder="What's on your mind? Hit Enter or Ctrl+Enter to dump…" rows="1" oninput="autoResize(this)" onkeydown="onKey(event)"></textarea>
      <div class="capture-meta">
        <div class="bucket-btns">
          <button class="bkt-btn active" data-b="idea" onclick="setBucket('idea',this)">💡 Idea</button>
          <button class="bkt-btn" data-b="task" onclick="setBucket('task',this)">✅ Task</button>
          <button class="bkt-btn" data-b="question" onclick="setBucket('question',this)">❓ Question</button>
          <button class="bkt-btn" data-b="random" onclick="setBucket('random',this)">🎲 Random</button>
        </div>
        <input class="tag-input" id="tag-input" placeholder="Tags: work, creative…" onkeydown="if(event.key==='Enter'){document.getElementById('dump-input').focus();}">
      </div>
    </div>
    <button class="dump-btn" onclick="dump()">Dump It →</button>
  </div>
</div>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('idea',this)">💡 Ideas</button>
  <button class="filter-btn" onclick="setFilter('task',this)">✅ Tasks</button>
  <button class="filter-btn" onclick="setFilter('question',this)">❓ Questions</button>
  <button class="filter-btn" onclick="setFilter('random',this)">🎲 Random</button>
  <input class="search-box" id="search-box" placeholder="Search…" oninput="render()">
</div>
<div class="cards-area">
  <div class="cards-grid" id="cards-grid"></div>
</div>
<script>
const KEY='braindump_v1';
let thoughts=JSON.parse(localStorage.getItem(KEY)||'[]');
let curBucket='idea', curFilter='all';
function save(){localStorage.setItem(KEY,JSON.stringify(thoughts));}

function setBucket(b,el){curBucket=b;document.querySelectorAll('.bkt-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.b===b));}
function setFilter(f,el){curFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',false));el.classList.add('active');render();}

function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dump();}
}

function dump(){
  const text=document.getElementById('dump-input').value.trim();
  if(!text) return;
  const tagRaw=document.getElementById('tag-input').value.trim();
  const tags=tagRaw?tagRaw.split(/[,\s]+/).filter(t=>t):[];
  const t={id:Date.now(),text,bucket:curBucket,tags,done:false,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})};
  thoughts.unshift(t);
  save();
  document.getElementById('dump-input').value='';
  document.getElementById('dump-input').style.height='auto';
  document.getElementById('tag-input').value='';
  render();
  document.getElementById('dump-input').focus();
}

function toggleDone(id){
  const t=thoughts.find(t=>t.id===id);
  if(t){t.done=!t.done;save();render();}
}
function deleteThought(id){thoughts=thoughts.filter(t=>t.id!==id);save();render();}
function clearAll(){if(confirm('Clear all thoughts?')){thoughts=[];save();render();}}

function filterTag(tag){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('search-box').value=tag;
  curFilter='all';
  document.querySelector('.filter-btn').classList.add('active');
  render();
}

function render(){
  const search=document.getElementById('search-box').value.toLowerCase();
  let shown=thoughts;
  if(curFilter!=='all') shown=shown.filter(t=>t.bucket===curFilter);
  if(search) shown=shown.filter(t=>t.text.toLowerCase().includes(search)||t.tags.some(tag=>tag.toLowerCase().includes(search)));

  document.getElementById('count-label').textContent=thoughts.length+' thought'+(thoughts.length!==1?'s':'');
  const g=document.getElementById('cards-grid');
  if(!shown.length){
    g.innerHTML=`<div class="empty-state"><div class="big">🧠</div><div>Your mind is clear — or nothing matches.</div></div>`;
    return;
  }
  const BUCKET_ICON={idea:'💡',task:'✅',question:'❓',random:'🎲'};
  g.innerHTML=shown.map(t=>`<div class="thought-card">
    <div class="tc-top">
      ${t.bucket==='task'?`<input type="checkbox" class="tc-check" ${t.done?'checked':''} onchange="toggleDone(${t.id})">` : ''}
      <span class="tc-badge badge-${t.bucket}">${BUCKET_ICON[t.bucket]} ${t.bucket}</span>
      <div class="tc-text ${t.done?'done':''}">${esc(t.text)}</div>
    </div>
    <div class="tc-footer">
      ${t.tags.map(tag=>`<span class="tc-tag" onclick="filterTag('${esc(tag)}')">#${esc(tag)}</span>`).join('')}
      <span class="tc-date">${t.date}</span>
    </div>
    <button class="tc-del" onclick="deleteThought(${t.id})">✕</button>
  </div>`).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkPad</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--surface:#11141c;--surface2:#181d28;--border:#1e2435;--border2:#28304a;
  --text:#e8eaf0;--muted:#5a6580;--muted2:#3a4260;
  --accent:#38bdf8;--accent-dim:rgba(56,189,248,.1);
  --mono:'Fira Code',monospace;--display:'Syne',sans-serif;--body:'Crimson Pro',serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TOPBAR */
.topbar{height:52px;background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-logo{font-family:var(--display);font-weight:800;font-size:.95rem;
  display:flex;align-items:center;gap:8px;color:var(--text)}
.topbar-logo span{color:var(--accent)}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center}
.tb-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.72rem;
  cursor:pointer;transition:all .15s;letter-spacing:.04em}
.tb-btn:hover,.tb-btn.active{border-color:var(--accent);color:var(--accent)}
.tb-btn.active{background:var(--accent-dim)}
.doc-name-input{background:transparent;border:none;color:var(--text);font-family:var(--display);
  font-size:.9rem;font-weight:600;outline:none;width:200px;padding:4px 8px;
  border-bottom:1px solid transparent;transition:border-color .15s}
.doc-name-input:focus{border-bottom-color:var(--accent)}

/* TOOLBAR */
.editor-toolbar{background:var(--surface2);border-bottom:1px solid var(--border);
  padding:6px 12px;display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;align-items:center}
.fmt-btn{padding:4px 9px;border-radius:5px;border:1px solid transparent;
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.75rem;
  cursor:pointer;transition:all .12s;line-height:1}
.fmt-btn:hover{background:var(--border);color:var(--text)}
.fmt-sep{width:1px;height:16px;background:var(--border2);margin:0 2px}

/* PANES */
.panes{flex:1;display:flex;overflow:hidden;min-height:0}
.editor-pane{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0}
.preview-pane{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg);min-width:0}
.editor-pane.full,.preview-pane.full{flex:2}
.editor-textarea{flex:1;border:none;background:transparent;color:var(--text);
  font-family:var(--mono);font-size:.87rem;line-height:1.85;
  padding:24px 28px;resize:none;outline:none;tab-size:2}

/* STATUSBAR */
.statusbar{background:var(--surface);border-top:1px solid var(--border);
  padding:5px 16px;font-size:.7rem;color:var(--muted);font-family:var(--mono);
  display:flex;gap:20px;flex-shrink:0;align-items:center}
.statusbar-right{margin-left:auto;display:flex;gap:16px;align-items:center}
.save-indicator{color:var(--muted2);transition:color .3s}
.save-indicator.saved{color:#22c55e}

/* PREVIEW STYLES */
.preview-pane h1,.preview-pane h2,.preview-pane h3,.preview-pane h4{
  font-family:var(--display);margin:1.4em 0 .5em;line-height:1.2}
.preview-pane h1{font-size:2rem;font-weight:800;border-bottom:1px solid var(--border);padding-bottom:.4em}
.preview-pane h2{font-size:1.5rem;font-weight:700}
.preview-pane h3{font-size:1.2rem;font-weight:700}
.preview-pane h4{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.preview-pane p{font-size:1.05rem;line-height:1.85;margin-bottom:1em;color:var(--text)}
.preview-pane a{color:var(--accent);text-decoration:underline}
.preview-pane strong{font-weight:700}
.preview-pane em{font-style:italic}
.preview-pane code{font-family:var(--mono);background:var(--surface2);
  padding:2px 6px;border-radius:4px;font-size:.85em;color:var(--accent);border:1px solid var(--border)}
.preview-pane pre{background:var(--surface2);border:1px solid var(--border);
  padding:16px;border-radius:8px;overflow-x:auto;margin:1em 0}
.preview-pane pre code{background:none;border:none;padding:0;color:var(--text)}
.preview-pane blockquote{border-left:3px solid var(--accent);padding:6px 16px;
  color:var(--muted);margin:1em 0;font-style:italic;background:var(--accent-dim);border-radius:0 6px 6px 0}
.preview-pane ul,.preview-pane ol{padding-left:1.6em;margin:.6em 0}
.preview-pane li{margin-bottom:.3em;line-height:1.7}
.preview-pane hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.preview-pane table{width:100%;border-collapse:collapse;margin:1em 0;font-size:.95rem}
.preview-pane th,.preview-pane td{padding:8px 14px;border:1px solid var(--border)}
.preview-pane th{background:var(--surface2);font-family:var(--display);font-weight:700;text-align:left}
.preview-pane tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.preview-pane img{max-width:100%;border-radius:6px;margin:1em 0}
.preview-pane .task-item{list-style:none;display:flex;align-items:flex-start;gap:8px}
.preview-pane .task-check{margin-top:3px;accent-color:var(--accent)}

/* DOCUMENTS LIST */
.docs-panel{width:220px;border-right:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.docs-panel.hidden{display:none}
.docs-header{padding:12px 14px 8px;font-family:var(--mono);font-size:.65rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.docs-list{flex:1;overflow-y:auto;padding:6px}
.doc-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:.82rem;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  color:var(--text);transition:background .12s;border:1px solid transparent}
.doc-item:hover{background:var(--surface2)}
.doc-item.active{background:var(--accent-dim);border-color:rgba(56,189,248,.2);color:var(--accent)}
.doc-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item-del{background:none;border:none;cursor:pointer;color:var(--muted2);
  font-size:.7rem;opacity:0;transition:opacity .12s;padding:2px 4px;border-radius:3px}
.doc-item:hover .doc-item-del{opacity:1}
.doc-item-del:hover{color:#ef4444;opacity:1}
.docs-new{margin:8px;padding:7px;border-radius:6px;background:var(--accent-dim);
  border:1px solid rgba(56,189,248,.2);color:var(--accent);font-family:var(--mono);
  font-size:.72rem;cursor:pointer;transition:all .15s;width:calc(100% - 16px)}
.docs-new:hover{background:rgba(56,189,248,.18)}

/* TOAST */
.toast-wrap{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:8px 14px;font-size:.75rem;color:var(--text);display:flex;align-items:center;
  gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:toastIn .2s ease;font-family:var(--mono)}
.toast.ok{border-left:3px solid #22c55e}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">✍️ <span>Mark</span>Pad</div>
  <input class="doc-name-input" id="doc-name" value="Untitled" placeholder="Document name…" oninput="renameCurrentDoc(this.value)">
  <div class="topbar-actions">
    <button class="tb-btn" id="btn-docs" onclick="toggleDocs()">📁 Docs</button>
    <button class="tb-btn active" id="btn-edit" onclick="setMode('edit')">Edit</button>
    <button class="tb-btn" id="btn-split" onclick="setMode('split')">Split</button>
    <button class="tb-btn" id="btn-preview" onclick="setMode('preview')">Preview</button>
    <button class="tb-btn" onclick="exportMd()">⬇ .md</button>
    <button class="tb-btn" onclick="exportHtml()">⬇ .html</button>
  </div>
</div>

<div class="editor-toolbar" id="editor-toolbar">
  <button class="fmt-btn" onclick="fmt('h1')" title="Heading 1"><b>H1</b></button>
  <button class="fmt-btn" onclick="fmt('h2')" title="Heading 2"><b>H2</b></button>
  <button class="fmt-btn" onclick="fmt('h3')" title="Heading 3"><b>H3</b></button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
  <button class="fmt-btn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
  <button class="fmt-btn" onclick="fmt('strike')" title="Strikethrough"><s>S</s></button>
  <button class="fmt-btn" onclick="fmt('code')" title="Inline code">`c`</button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmt('ul')" title="Bullet list">• List</button>
  <button class="fmt-btn" onclick="fmt('ol')" title="Numbered list">1. List</button>
  <button class="fmt-btn" onclick="fmt('task')" title="Task list">☑ Task</button>
  <button class="fmt-btn" onclick="fmt('quote')" title="Blockquote">❝</button>
  <button class="fmt-btn" onclick="fmt('codeblock')" title="Code block">```</button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="fmt('hr')" title="Divider">—</button>
  <button class="fmt-btn" onclick="fmt('table')" title="Table">⊞</button>
  <button class="fmt-btn" onclick="fmt('link')" title="Link">🔗</button>
</div>

<div style="display:flex;flex:1;overflow:hidden;min-height:0">
  <div class="docs-panel hidden" id="docs-panel">
    <div class="docs-header">
      <span>Documents</span>
      <span id="doc-count" style="color:var(--muted2)">0</span>
    </div>
    <div class="docs-list" id="docs-list"></div>
    <button class="docs-new" onclick="newDoc()">＋ New Document</button>
  </div>

  <div class="panes" id="panes">
    <div class="editor-pane full" id="editor-pane">
      <textarea class="editor-textarea" id="md-input"
        placeholder="Start writing… use the toolbar above or plain Markdown."
        oninput="onInput()" onkeydown="handleKey(event)" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane" id="preview-pane" style="display:none"></div>
  </div>
</div>

<div class="statusbar">
  <span id="sb-mode" style="color:var(--accent)">EDIT</span>
  <span id="sb-words">0 words</span>
  <span id="sb-chars">0 chars</span>
  <span id="sb-lines">1 line</span>
  <div class="statusbar-right">
    <span class="save-indicator" id="save-indicator">● saved</span>
    <span id="sb-doc">Untitled</span>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const STORE_KEY = 'markpad_docs';
let docs = {}, currentDocId = null, mode = 'edit', saveTimer = null, docsVisible = false;

// ── STORAGE ──────────────────────────
function loadDocs() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } }
function saveDocs() { localStorage.setItem(STORE_KEY, JSON.stringify(docs)); }

// ── INIT ─────────────────────────────
function init() {
  docs = loadDocs();
  if (!Object.keys(docs).length) newDoc();
  else { const id = Object.keys(docs)[0]; openDoc(id); }
  renderDocsList();
}

function newDoc() {
  const id = 'doc_' + Date.now();
  docs[id] = { name: 'Untitled', content: '', created: Date.now(), updated: Date.now() };
  saveDocs(); renderDocsList(); openDoc(id);
}

function openDoc(id) {
  if (currentDocId && docs[currentDocId]) docs[currentDocId].content = document.getElementById('md-input').value;
  currentDocId = id;
  const doc = docs[id];
  document.getElementById('md-input').value = doc.content;
  document.getElementById('doc-name').value = doc.name;
  document.getElementById('sb-doc').textContent = doc.name;
  renderDocsList(); updateStats(); if (mode !== 'edit') renderPreview();
}

function renameCurrentDoc(name) {
  if (!currentDocId) return;
  docs[currentDocId].name = name || 'Untitled';
  document.getElementById('sb-doc').textContent = docs[currentDocId].name;
  saveDocs(); renderDocsList();
}

function deleteDoc(id, e) {
  e.stopPropagation();
  if (Object.keys(docs).length === 1) { toast('Cannot delete last document'); return; }
  if (!confirm('Delete "' + docs[id].name + '"?')) return;
  delete docs[id]; saveDocs();
  if (currentDocId === id) { const first = Object.keys(docs)[0]; openDoc(first); }
  renderDocsList();
}

function renderDocsList() {
  const list = document.getElementById('docs-list');
  const ids = Object.keys(docs).sort((a,b) => (docs[b].updated||0) - (docs[a].updated||0));
  document.getElementById('doc-count').textContent = ids.length;
  list.innerHTML = ids.map(id => {
    const d = docs[id], active = id === currentDocId;
    return `<div class="doc-item${active?' active':''}" onclick="openDoc('${id}')">
      <span class="doc-item-name">${esc(d.name||'Untitled')}</span>
      <button class="doc-item-del" onclick="deleteDoc('${id}',event)" title="Delete">✕</button>
    </div>`;
  }).join('');
}

function toggleDocs() {
  docsVisible = !docsVisible;
  document.getElementById('docs-panel').classList.toggle('hidden', !docsVisible);
  document.getElementById('btn-docs').classList.toggle('active', docsVisible);
}

// ── MODE ─────────────────────────────
function setMode(m) {
  mode = m;
  const ep = document.getElementById('editor-pane');
  const pp = document.getElementById('preview-pane');
  const tb = document.getElementById('editor-toolbar');
  ['btn-edit','btn-split','btn-preview'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  document.getElementById('sb-mode').textContent = m.toUpperCase();
  if (m === 'edit') {
    ep.style.display='flex'; ep.className='editor-pane full'; pp.style.display='none'; tb.style.display='flex';
  } else if (m === 'preview') {
    ep.style.display='none'; pp.style.display='block'; pp.className='preview-pane full'; tb.style.display='none'; renderPreview();
  } else {
    ep.style.display='flex'; ep.className='editor-pane'; pp.style.display='block'; pp.className='preview-pane'; tb.style.display='flex'; renderPreview();
  }
}

// ── MARKDOWN RENDER ───────────────────
function md2html(md) {
  let h = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^######\s(.+)$/gm,'<h6>$1</h6>').replace(/^#####\s(.+)$/gm,'<h5>$1</h5>')
    .replace(/^####\s(.+)$/gm,'<h4>$1</h4>').replace(/^###\s(.+)$/gm,'<h3>$1</h3>')
    .replace(/^##\s(.+)$/gm,'<h2>$1</h2>').replace(/^#\s(.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/```([\w]*)\n([\s\S]*?)```/gm,'<pre><code class="lang-$1">$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/^&gt;\s(.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\- \[x\]\s(.+)$/gm,'<li class="task-item"><input type="checkbox" class="task-check" checked disabled> $1</li>')
    .replace(/^\- \[ \]\s(.+)$/gm,'<li class="task-item"><input type="checkbox" class="task-check" disabled> $1</li>')
    .replace(/^[-*+]\s(.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\.\s(.+)$/gm,'<oli>$1</oli>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  // wrap list items
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>'+m+'</ul>');
  h = h.replace(/(<oli>.*<\/oli>\n?)+/g, m => '<ol>'+m.replace(/<\/?oli>/g, s => s.replace('oli','li'))+'</ol>');
  // paragraphs
  return h.split(/\n{2,}/).map(b => {
    b = b.trim();
    if (!b) return '';
    if (/^<(h[1-6]|ul|ol|li|blockquote|pre|hr|img)/.test(b)) return b;
    return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
  }).filter(Boolean).join('\n');
}

function renderPreview() {
  const pp = document.getElementById('preview-pane');
  pp.innerHTML = md2html(document.getElementById('md-input').value);
}

// ── FORMAT HELPERS ────────────────────
function fmt(type) {
  const ta = document.getElementById('md-input');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e) || 'text';
  const before = ta.value.slice(0, s), after = ta.value.slice(e);
  const map = {
    h1: ['# ',''], h2: ['## ',''], h3: ['### '],
    bold: ['**','**'], italic: ['*','*'], strike: ['~~','~~'],
    code: ['`','`'], quote: ['> ',''], ul: ['- ',''], ol: ['1. ',''],
    task: ['- [ ] ',''], codeblock: ['```\n','\n```'],
    hr: ['\n---\n',''], table: ['\n| Col 1 | Col 2 |\n|-------|-------|\n| Cell  | Cell  |\n',''],
    link: ['[',`](url)`],
  };
  if (!map[type]) return;
  const [pre, post=''] = map[type];
  const insert = pre + sel + post;
  ta.value = before + insert + after;
  ta.selectionStart = s + pre.length;
  ta.selectionEnd = s + pre.length + sel.length;
  ta.focus();
  onInput();
}

function handleKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.slice(0,s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
  }
}

// ── INPUT HANDLER ─────────────────────
function onInput() {
  const val = document.getElementById('md-input').value;
  if (mode !== 'edit') renderPreview();
  updateStats();
  markUnsaved();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => autoSave(), 800);
}

function updateStats() {
  const val = document.getElementById('md-input').value;
  const words = val.trim() ? val.trim().split(/\s+/).length : 0;
  document.getElementById('sb-words').textContent = words + ' words';
  document.getElementById('sb-chars').textContent = val.length + ' chars';
  document.getElementById('sb-lines').textContent = val.split('\n').length + ' lines';
}

function markUnsaved() {
  const ind = document.getElementById('save-indicator');
  ind.textContent = '● unsaved'; ind.className = 'save-indicator';
}

function autoSave() {
  if (!currentDocId) return;
  docs[currentDocId].content = document.getElementById('md-input').value;
  docs[currentDocId].updated = Date.now();
  saveDocs();
  const ind = document.getElementById('save-indicator');
  ind.textContent = '● saved'; ind.className = 'save-indicator saved';
}

// ── EXPORT ────────────────────────────
function exportMd() {
  const doc = docs[currentDocId]; if (!doc) return;
  const blob = new Blob([doc.content], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (doc.name||'document').replace(/[^a-z0-9]/gi,'_') + '.md';
  a.click(); toast('Exported as .md', 'ok');
}

function exportHtml() {
  const doc = docs[currentDocId]; if (!doc) return;
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(doc.name)}</title>
<style>body{max-width:800px;margin:40px auto;font-family:Georgia,serif;line-height:1.7;color:#222;padding:0 20px}
h1,h2,h3{font-family:sans-serif}code{background:#f0f0f0;padding:2px 6px;border-radius:3px}
pre{background:#f0f0f0;padding:16px;border-radius:6px;overflow-x:auto}
blockquote{border-left:3px solid #999;padding:4px 16px;color:#666}</style></head>
<body>${md2html(doc.content)}</body></html>`;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (doc.name||'document').replace(/[^a-z0-9]/gi,'_') + '.html';
  a.click(); toast('Exported as .html', 'ok');
}

// ── UTILS ─────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type='info') {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div'); t.className = 'toast'+(type==='ok'?' ok':'');
  t.textContent = msg; w.appendChild(t); setTimeout(()=>t.remove(), 2500);
}

// ── KEYBOARD ──────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 's') { e.preventDefault(); autoSave(); toast('Saved','ok'); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'n') { e.preventDefault(); newDoc(); }
});

init();
</script>
</body>
</html>

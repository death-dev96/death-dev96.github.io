<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OutlineBuilder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090e;--surface:#111118;--surface2:#18181f;--border:#20202c;--border2:#2c2c3c;
  --text:#eeeef5;--muted:#55556a;--muted2:#2c2c3c;
  --accent:#60a5fa;--accent-dim:rgba(96,165,250,.1);
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.topbar{height:52px;background:var(--surface);border-bottom:2px solid var(--accent);
  padding:0 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{font-family:var(--display);font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.doc-name{background:transparent;border:none;color:var(--text);font-family:var(--body);
  font-size:.9rem;font-weight:600;outline:none;padding:4px 8px;min-width:160px;
  border-bottom:1px solid transparent;transition:border-color .15s}
.doc-name:focus{border-bottom-color:var(--accent)}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center}
.tb-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:var(--mono);font-size:.72rem;
  cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.app{flex:1;display:flex;overflow:hidden;min-height:0}

/* OUTLINE PANEL */
.outline-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.outline-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);
  display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.hint{font-size:.68rem;color:var(--muted2);font-family:var(--mono);margin-left:auto}
.outline-wrap{flex:1;overflow-y:auto;padding:16px 20px}

/* NODES */
.node{position:relative;margin:2px 0}
.node-row{display:flex;align-items:flex-start;gap:0;border-radius:7px;
  transition:background .12s;position:relative}
.node-row:hover{background:var(--surface)}
.node-row.drag-over{background:var(--accent-dim);outline:1px dashed var(--accent)}
.node-row.dragging{opacity:.4}
.node-indent{display:flex;align-items:flex-start;gap:0;flex-shrink:0}
.node-connector{width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding-top:8px;cursor:pointer;opacity:0;transition:opacity .12s;flex-direction:column;gap:2px}
.node-row:hover .node-connector{opacity:1}
.nc-dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
.node-toggle{width:24px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:.7rem;color:var(--muted2);transition:transform .15s}
.node-toggle.open{transform:rotate(90deg)}
.node-toggle.leaf{opacity:0;pointer-events:none}
.node-bullet{width:22px;height:32px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer}
.node-bullet-dot{width:7px;height:7px;border-radius:50%;border:2px solid var(--muted2);
  transition:all .12s;flex-shrink:0}
.node-row:hover .node-bullet-dot{border-color:var(--accent);background:var(--accent-dim)}
.node-input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--body);
  font-size:.93rem;line-height:1.5;padding:6px 8px 6px 2px;outline:none;resize:none;
  overflow:hidden;min-height:32px}
.node-input::placeholder{color:var(--muted2)}
.node-acts{display:none;gap:2px;flex-shrink:0;padding-top:6px}
.node-row:hover .node-acts{display:flex}
.na-btn{padding:3px 6px;border-radius:4px;border:none;background:transparent;
  color:var(--muted);cursor:pointer;font-size:.75rem;transition:all .12s;font-family:var(--mono)}
.na-btn:hover{background:var(--border2);color:var(--text)}
.na-btn.del:hover{color:#ef4444}
.node-children{padding-left:20px}
.node-children.collapsed{display:none}

/* DEPTH COLORS */
.depth-0 .node-bullet-dot{border-color:#60a5fa;background:rgba(96,165,250,.15)}
.depth-1 .node-bullet-dot{border-color:#a78bfa;background:rgba(167,139,250,.1)}
.depth-2 .node-bullet-dot{border-color:#34d399;background:rgba(52,211,153,.1)}
.depth-3 .node-bullet-dot{border-color:#fbbf24;background:rgba(251,191,36,.1)}

/* PREVIEW PANEL */
.preview-col{width:320px;border-left:1px solid var(--border);display:flex;flex-direction:column;
  background:var(--surface);overflow:hidden;flex-shrink:0}
.preview-header{padding:12px 16px;font-size:.62rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.preview-body{flex:1;overflow-y:auto;padding:16px;font-family:var(--mono);
  font-size:.78rem;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.preview-body .pv-h1{color:var(--accent);font-weight:700;font-size:.9rem}
.preview-body .pv-h2{color:var(--text);padding-left:12px}
.preview-body .pv-h3{color:var(--muted);padding-left:24px}
.preview-body .pv-h4{color:var(--muted2);padding-left:36px}
.copy-all-btn{margin:10px;padding:8px;border-radius:7px;background:var(--accent-dim);
  border:1px solid rgba(96,165,250,.2);color:var(--accent);font-family:var(--mono);
  font-size:.72rem;cursor:pointer;transition:all .15s;flex-shrink:0}
.copy-all-btn:hover{background:rgba(96,165,250,.18)}

/* TOAST */
.toast-wrap{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:7px 14px;font-size:.75rem;color:var(--text);border-left:3px solid var(--accent);
  animation:tIn .15s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Outline<span>Builder</span></div>
  <input class="doc-name" id="doc-name" value="Untitled Outline" placeholder="Outline name…" oninput="saveOutline()">
  <div class="topbar-actions">
    <button class="tb-btn" onclick="exportMd()">⬇ Markdown</button>
    <button class="tb-btn" onclick="exportText()">⬇ Plain Text</button>
    <button class="tb-btn" onclick="collapseAll()">⊟ Collapse All</button>
    <button class="tb-btn" onclick="expandAll()">⊞ Expand All</button>
    <button class="tb-btn" onclick="newOutline()">✕ New</button>
  </div>
</div>

<div class="app">

  <div class="outline-col">
    <div class="outline-toolbar">
      <button class="tb-btn primary" onclick="addRootNode()">＋ Add Item</button>
      <button class="tb-btn" onclick="focusFirst()">▶ Focus First</button>
      <span class="hint">Tab=indent · Shift+Tab=outdent · Enter=new item · Ctrl+↑↓=move</span>
    </div>
    <div class="outline-wrap" id="outline-wrap">
      <div style="color:var(--muted2);font-size:.85rem;font-style:italic;padding:20px 0;text-align:center" id="empty-hint">
        Click "+ Add Item" or press Enter to start your outline
      </div>
    </div>
  </div>

  <div class="preview-col">
    <div class="preview-header">
      <span>Preview</span>
      <span id="node-count" style="color:var(--muted2)">0 items</span>
    </div>
    <div class="preview-body" id="preview-body"></div>
    <button class="copy-all-btn" onclick="copyMarkdown()">⎘ Copy as Markdown</button>
  </div>

</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const STORE_KEY = 'outlinebuilder_v1';
let outline = { name:'Untitled Outline', nodes:[] };
let dragSrc = null;

// ── DATA ──────────────────────────────
function loadOutline() { try { return JSON.parse(localStorage.getItem(STORE_KEY))||{name:'Untitled Outline',nodes:[]}; } catch { return {name:'Untitled Outline',nodes:[]}; } }
function saveOutline() {
  outline.name = document.getElementById('doc-name').value || 'Untitled Outline';
  collectFromDOM();
  localStorage.setItem(STORE_KEY, JSON.stringify(outline));
  renderPreview();
}

function newId() { return 'n'+Date.now()+Math.random().toString(36).slice(2,6); }

function newNode(text='') { return { id:newId(), text, children:[], collapsed:false }; }

// ── COLLECT DOM → DATA ────────────────
function collectFromDOM() {
  outline.nodes = collectChildren(document.getElementById('outline-wrap'));
}

function collectChildren(parent) {
  const nodes = [];
  parent.querySelectorAll(':scope > .node').forEach(nodeEl => {
    const id = nodeEl.dataset.id;
    const text = nodeEl.querySelector('.node-input')?.value || '';
    const collapsed = nodeEl.querySelector('.node-children')?.classList.contains('collapsed') || false;
    const children = collectChildren(nodeEl.querySelector('.node-children') || nodeEl);
    nodes.push({ id, text, children, collapsed });
  });
  return nodes;
}

// ── RENDER ────────────────────────────
function render() {
  const wrap = document.getElementById('outline-wrap');
  const hint = document.getElementById('empty-hint');
  if (!outline.nodes.length) {
    wrap.innerHTML = '';
    wrap.appendChild(hint);
    hint.style.display='block';
    renderPreview(); return;
  }
  hint.style.display='none';
  const existingIds = new Set(wrap.querySelectorAll('.node').map ? [] : []);
  wrap.innerHTML = '';
  outline.nodes.forEach(n => wrap.appendChild(buildNodeEl(n, 0)));
  renderPreview();
}

function buildNodeEl(node, depth) {
  const div = document.createElement('div');
  div.className = `node depth-${Math.min(depth,3)}`;
  div.dataset.id = node.id;
  div.draggable = true;

  const hasChildren = node.children && node.children.length > 0;
  const toggleClass = hasChildren ? (node.collapsed ? '' : ' open') : ' leaf';

  div.innerHTML = `
    <div class="node-row" data-id="${node.id}">
      <span class="node-connector" onclick="addChildNode('${node.id}')"><span class="nc-dot"></span><span class="nc-dot"></span><span class="nc-dot"></span></span>
      <span class="node-toggle${toggleClass}" onclick="toggleNode('${node.id}')">▶</span>
      <span class="node-bullet"><span class="node-bullet-dot"></span></span>
      <textarea class="node-input" data-id="${node.id}" placeholder="Item text…" rows="1"
        oninput="autoResize(this);saveOutline()" onkeydown="handleNodeKey(event,'${node.id}')"
        onfocus="updatePreviewFocus('${node.id}')">${esc(node.text)}</textarea>
      <div class="node-acts">
        <button class="na-btn" onclick="addSiblingNode('${node.id}')" title="Add item below">＋</button>
        <button class="na-btn" onclick="addChildNode('${node.id}')" title="Add child">⤵</button>
        <button class="na-btn del" onclick="deleteNode('${node.id}')" title="Delete">✕</button>
      </div>
    </div>
    <div class="node-children${node.collapsed?' collapsed':''}"></div>`;

  const childWrap = div.querySelector('.node-children');
  (node.children||[]).forEach(c => childWrap.appendChild(buildNodeEl(c, depth+1)));

  // Drag events
  div.addEventListener('dragstart', e => { dragSrc = node.id; div.classList.add('dragging'); e.stopPropagation(); });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));
  div.querySelector('.node-row').addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); div.querySelector('.node-row').classList.add('drag-over'); });
  div.querySelector('.node-row').addEventListener('dragleave', () => div.querySelector('.node-row').classList.remove('drag-over'));
  div.querySelector('.node-row').addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    div.querySelector('.node-row').classList.remove('drag-over');
    if (dragSrc && dragSrc !== node.id) { moveNodeBefore(dragSrc, node.id); }
  });

  // Auto-resize textarea
  setTimeout(() => { const ta = div.querySelector('.node-input'); if(ta) autoResize(ta); }, 0);

  return div;
}

function autoResize(ta) {
  ta.style.height='auto';
  ta.style.height=ta.scrollHeight+'px';
}

// ── OPERATIONS ────────────────────────
function findNodeAndParent(nodes, id, parent=null) {
  for (let i=0; i<nodes.length; i++) {
    if (nodes[i].id===id) return {node:nodes[i],parent,index:i};
    const r = findNodeAndParent(nodes[i].children||[], id, nodes[i]);
    if (r) return r;
  }
  return null;
}

function removeNode(nodes, id) {
  for (let i=0; i<nodes.length; i++) {
    if (nodes[i].id===id) { nodes.splice(i,1); return true; }
    if (removeNode(nodes[i].children||[], id)) return true;
  }
  return false;
}

function addRootNode() {
  collectFromDOM();
  outline.nodes.push(newNode());
  render();
  focusLast();
  saveOutline();
}

function addSiblingNode(id) {
  collectFromDOM();
  const r = findNodeAndParent(outline.nodes, id);
  if (!r) return;
  const siblings = r.parent ? r.parent.children : outline.nodes;
  siblings.splice(r.index+1, 0, newNode());
  render();
  focusNode(siblings[r.index+1].id);
  saveOutline();
}

function addChildNode(id) {
  collectFromDOM();
  const r = findNodeAndParent(outline.nodes, id);
  if (!r) return;
  if (!r.node.children) r.node.children=[];
  r.node.children.push(newNode());
  r.node.collapsed=false;
  render();
  focusNode(r.node.children[r.node.children.length-1].id);
  saveOutline();
}

function deleteNode(id) {
  collectFromDOM();
  removeNode(outline.nodes, id);
  render();
  saveOutline();
}

function toggleNode(id) {
  collectFromDOM();
  const r = findNodeAndParent(outline.nodes, id);
  if (r) { r.node.collapsed = !r.node.collapsed; render(); saveOutline(); }
}

function moveNodeBefore(srcId, targetId) {
  collectFromDOM();
  const srcR = findNodeAndParent(outline.nodes, srcId);
  if (!srcR) return;
  const node = JSON.parse(JSON.stringify(srcR.node));
  removeNode(outline.nodes, srcId);
  const tgtR = findNodeAndParent(outline.nodes, targetId);
  if (!tgtR) { outline.nodes.push(node); }
  else {
    const siblings = tgtR.parent ? tgtR.parent.children : outline.nodes;
    siblings.splice(tgtR.index, 0, node);
  }
  render(); saveOutline();
}

function collapseAll() {
  collectFromDOM();
  function collapse(nodes) { nodes.forEach(n => { n.collapsed=true; collapse(n.children||[]); }); }
  collapse(outline.nodes); render(); saveOutline();
}
function expandAll() {
  collectFromDOM();
  function expand(nodes) { nodes.forEach(n => { n.collapsed=false; expand(n.children||[]); }); }
  expand(outline.nodes); render(); saveOutline();
}

function newOutline() {
  if (!confirm('Start a new outline? Current outline will be lost.')) return;
  outline = {name:'Untitled Outline', nodes:[]};
  document.getElementById('doc-name').value='Untitled Outline';
  render(); saveOutline();
}

// ── KEYBOARD HANDLING ─────────────────
function handleNodeKey(e, id) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); addSiblingNode(id); }
  if (e.key==='Tab' && !e.shiftKey) { e.preventDefault(); indentNode(id); }
  if (e.key==='Tab' && e.shiftKey) { e.preventDefault(); outdentNode(id); }
}

function indentNode(id) {
  collectFromDOM();
  const r = findNodeAndParent(outline.nodes, id);
  if (!r || r.index===0) return;
  const siblings = r.parent ? r.parent.children : outline.nodes;
  const prev = siblings[r.index-1];
  const node = siblings.splice(r.index,1)[0];
  if (!prev.children) prev.children=[];
  prev.children.push(node);
  prev.collapsed=false;
  render(); focusNode(id); saveOutline();
}

function outdentNode(id) {
  collectFromDOM();
  const r = findNodeAndParent(outline.nodes, id);
  if (!r || !r.parent) return;
  const prR = findNodeAndParent(outline.nodes, r.parent.id);
  const node = r.parent.children.splice(r.index,1)[0];
  const insertSiblings = prR ? (prR.parent ? prR.parent.children : outline.nodes) : outline.nodes;
  const insertIdx = prR ? prR.index+1 : insertSiblings.length;
  insertSiblings.splice(insertIdx, 0, node);
  render(); focusNode(id); saveOutline();
}

// ── FOCUS ─────────────────────────────
function focusNode(id) {
  setTimeout(() => { const ta = document.querySelector(`.node-input[data-id="${id}"]`); if(ta){ta.focus();ta.selectionStart=ta.selectionEnd=ta.value.length;} }, 30);
}
function focusLast() {
  setTimeout(() => { const all=document.querySelectorAll('.node-input'); if(all.length){const last=all[all.length-1];last.focus();} }, 30);
}
function focusFirst() {
  setTimeout(() => { const first=document.querySelector('.node-input'); if(first) first.focus(); }, 30);
}
function updatePreviewFocus(id) { /* could highlight in preview */ }

// ── PREVIEW ───────────────────────────
function renderPreview() {
  collectFromDOM();
  const lines = [];
  function walk(nodes, depth) {
    nodes.forEach(n => {
      const pfx = depth===0?'●':depth===1?'○':depth===2?'▪':'–';
      const pad = '  '.repeat(depth);
      lines.push(`${pad}${pfx} ${n.text||'(empty)'}`);
      if (n.children && n.children.length && !n.collapsed) walk(n.children, depth+1);
    });
  }
  walk(outline.nodes, 0);
  const total = countNodes(outline.nodes);
  document.getElementById('node-count').textContent = total+' item'+(total===1?'':'s');
  const pb = document.getElementById('preview-body');
  pb.innerHTML = lines.map((l,i) => {
    const depth = (l.match(/^(\s*)/)||['',''])[1].length/2;
    const cls = ['pv-h1','pv-h2','pv-h3','pv-h4'][Math.min(depth,3)];
    return `<div class="${cls}">${esc(l)}</div>`;
  }).join('');
}

function countNodes(nodes) {
  return nodes.reduce((s,n) => s+1+countNodes(n.children||[]), 0);
}

// ── EXPORT ────────────────────────────
function toMarkdown(nodes, depth=0) {
  return nodes.map(n => {
    const pfx = depth===0?'# ':depth===1?'## ':depth===2?'### ':'- ';
    const line = pfx + (n.text||'Item');
    const children = n.children && n.children.length ? '\n'+toMarkdown(n.children, depth+1) : '';
    return line + children;
  }).join('\n');
}

function toPlainText(nodes, depth=0) {
  return nodes.map(n => {
    const pad = '  '.repeat(depth);
    const line = pad + '• ' + (n.text||'Item');
    const children = n.children && n.children.length ? '\n'+toPlainText(n.children, depth+1) : '';
    return line + children;
  }).join('\n');
}

function exportMd() {
  collectFromDOM();
  const md = `# ${outline.name}\n\n` + toMarkdown(outline.nodes);
  dl(md, outline.name.replace(/[^a-z0-9]/gi,'_')+'.md', 'text/markdown');
  toast('Exported as Markdown');
}

function exportText() {
  collectFromDOM();
  const txt = outline.name + '\n' + '='.repeat(outline.name.length) + '\n\n' + toPlainText(outline.nodes);
  dl(txt, outline.name.replace(/[^a-z0-9]/gi,'_')+'.txt', 'text/plain');
  toast('Exported as plain text');
}

function copyMarkdown() {
  collectFromDOM();
  const md = toMarkdown(outline.nodes);
  navigator.clipboard?.writeText(md).then(()=>toast('Copied as Markdown'));
}

function dl(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename; a.click();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  w.appendChild(t);setTimeout(()=>t.remove(),2200);
}

// ── INIT ─────────────────────────────
outline = loadOutline();
document.getElementById('doc-name').value = outline.name;
render();
</script>
</body>
</html>
